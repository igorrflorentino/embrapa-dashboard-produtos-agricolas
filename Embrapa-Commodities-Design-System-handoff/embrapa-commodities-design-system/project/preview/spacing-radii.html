<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 64px; height: 64px; background: var(--embrapa-green); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .name { font-size: 11px; font-weight: 500; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius: 2px;"></div><div class="name">xs</div><div class="label">2 px</div></div>
  <div class="item"><div class="box" style="border-radius: 4px;"></div><div class="name">sm</div><div class="label">4 px</div></div>
  <div class="item"><div class="box" style="border-radius: 6px;"></div><div class="name">md</div><div class="label">6 px</div></div>
  <div class="item"><div class="box" style="border-radius: 10px;"></div><div class="name">lg · default card</div><div class="label">10 px</div></div>
  <div class="item"><div class="box" style="border-radius: 16px;"></div><div class="name">xl</div><div class="label">16 px</div></div>
  <div class="item"><div class="box" style="border-radius: 999px;"></div><div class="name">pill</div><div class="label">999 px</div></div>
</body>
</html>
