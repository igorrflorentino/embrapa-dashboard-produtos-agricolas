<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border: none; }
  .label { width: 110px; flex-shrink: 0; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .specimen { flex: 1; min-width: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); white-space: nowrap; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">.display</div>
    <div class="specimen display">Inteligência</div>
    <div class="meta">Univers 65 Bold · 56 / 1.05</div>
  </div>
  <div class="row">
    <div class="label">.h1</div>
    <div class="specimen h1">Mercado de Commodities</div>
    <div class="meta">Univers · 40 / 1.12</div>
  </div>
  <div class="row">
    <div class="label">.h2</div>
    <div class="specimen h2">Produção extrativa vegetal</div>
    <div class="meta">Univers · 30 / 1.18</div>
  </div>
  <div class="row">
    <div class="label">.h3</div>
    <div class="specimen h3">Valor real (IPCA) — R$</div>
    <div class="meta">Univers · 22 / 1.28</div>
  </div>
</body>
</html>
