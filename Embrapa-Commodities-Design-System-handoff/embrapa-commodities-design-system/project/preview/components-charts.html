<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: #fff; border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-1);}
  .head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px;}
  .ov { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; color: var(--fg-3); }
  .title { font-size: 14px; font-weight: 500; color: var(--fg-1); margin-top: 4px;}
  .legend { display: flex; gap: 10px; font-size: 11px; color: var(--fg-3);}
  .leg { display: inline-flex; align-items: center; gap: 5px;}
  .dot { width: 8px; height: 8px; border-radius: 2px;}
  svg { width: 100%; height: 140px; }
  .axis text { font: 400 9px var(--font-mono); fill: var(--fg-3);}
  .grid { stroke: var(--border-subtle); stroke-width: 1;}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div>
        <div class="ov">Valor real · IPCA</div>
        <div class="title">Castanha-do-pará — Pará</div>
      </div>
      <div class="legend"><span class="leg"><span class="dot" style="background:#1D4D7E"></span>BRL</span></div>
    </div>
    <svg viewBox="0 0 300 140" preserveAspectRatio="none">
      <line class="grid" x1="0" y1="120" x2="300" y2="120"/>
      <line class="grid" x1="0" y1="80" x2="300" y2="80"/>
      <line class="grid" x1="0" y1="40" x2="300" y2="40"/>
      <polyline fill="none" stroke="#1D4D7E" stroke-width="2"
        points="0,90 25,80 50,72 75,68 100,60 125,55 150,50 175,42 200,48 225,40 250,35 275,28 300,22"/>
      <polyline fill="rgba(29,77,126,0.12)" stroke="none"
        points="0,90 25,80 50,72 75,68 100,60 125,55 150,50 175,42 200,48 225,40 250,35 275,28 300,22 300,140 0,140"/>
    </svg>
  </div>
  <div class="card">
    <div class="head">
      <div>
        <div class="ov">Quantidade</div>
        <div class="title">Top UFs · 2023</div>
      </div>
      <div class="legend"><span class="leg"><span class="dot" style="background:#006f35"></span>toneladas</span></div>
    </div>
    <svg viewBox="0 0 300 140" preserveAspectRatio="none">
      <g>
        <rect x="10" y="30" width="40" height="90" fill="#006f35"/>
        <rect x="60" y="50" width="40" height="70" fill="#006f35"/>
        <rect x="110" y="70" width="40" height="50" fill="#006f35"/>
        <rect x="160" y="85" width="40" height="35" fill="#006f35"/>
        <rect x="210" y="95" width="40" height="25" fill="#006f35"/>
        <rect x="260" y="105" width="30" height="15" fill="#006f35"/>
      </g>
    </svg>
  </div>
</body>
</html>
