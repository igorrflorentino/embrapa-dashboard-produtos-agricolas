<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; display: flex; flex-direction: column; gap: 18px;}
  .swatch { padding: 22px 28px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;}
  .swatch.light { background: #fff; border: 1px solid var(--border-default);}
  .swatch.dark  { background: #003c1d; }
  .swatch img { max-width: 100%; max-height: 70px; object-fit: contain;}
  .caption { font-size: 11px; color: var(--fg-3); text-align: center; max-width: 720px; margin: 0 auto; line-height: 1.5;}
</style>
</head>
<body>
  <div class="swatch light"><img src="../assets/triade-horizontal-color.png" alt="Triade horizontal color"></div>
  <p class="caption">Tríade institucional · Embrapa + Ministério da Agricultura e Pecuária + Governo do Brasil "Do lado do povo brasileiro" — composição horizontal preferida para rodapés e capas de slides.</p>
</body>
</html>
