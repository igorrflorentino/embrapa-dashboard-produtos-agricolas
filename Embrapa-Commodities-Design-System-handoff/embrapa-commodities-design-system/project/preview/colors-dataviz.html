<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; }
  .group-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin: 0 0 14px; font-weight: 500;}
  .bars { display: flex; gap: 4px; height: 96px; align-items: flex-end; padding: 0 4px; }
  .bar { flex: 1; border-radius: 4px 4px 0 0; position: relative; }
  .bar::after { content: attr(data-h); position: absolute; bottom: -22px; left: 0; right: 0; text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .legend { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 30px; font-size: 11px; }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
  <div class="group-label">Data viz scale · 8-stop sequence (colorblind-passable)</div>
  <div class="bars">
    <div class="bar" style="background:#1D4D7E; height: 60%" data-h="#1D4D7E"></div>
    <div class="bar" style="background:#006f35; height: 85%" data-h="#006F35"></div>
    <div class="bar" style="background:#B7791F; height: 70%" data-h="#B7791F"></div>
    <div class="bar" style="background:#3A74B0; height: 50%" data-h="#3A74B0"></div>
    <div class="bar" style="background:#6e867d; height: 40%" data-h="#6E867D"></div>
    <div class="bar" style="background:#B23A2B; height: 65%" data-h="#B23A2B"></div>
    <div class="bar" style="background:#0e3b65; height: 75%" data-h="#0E3B65"></div>
    <div class="bar" style="background:#B4D0E7; height: 30%" data-h="#B4D0E7"></div>
  </div>
  <div class="legend">
    <div class="item"><div class="dot" style="background:#1D4D7E"></div>viz-1 · primary series</div>
    <div class="item"><div class="dot" style="background:#006f35"></div>viz-2 · brand accent</div>
    <div class="item"><div class="dot" style="background:#B7791F"></div>viz-3 · warm contrast</div>
    <div class="item"><div class="dot" style="background:#3A74B0"></div>viz-4 · light blue</div>
  </div>
</body>
</html>
