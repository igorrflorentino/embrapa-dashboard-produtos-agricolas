# Dashboard smoke test — the source of truth for "did the dashboard work on this PR".
#
# Runs `make test-smoke`, which (via tests/test_dashboard_smoke.py) boots the
# Dash app, hits /_health and /, lists Dash callback dependencies, and forces
# a live-BigQuery route render on /ibge-pevs/visao-geral. A green run proves
# the dashboard renders against real Gold tables; a failed run blocks merge.
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME GCP SETUP (do this once per repo, then this workflow is hands-off):
#
#  1. Create a Workload Identity Pool + Provider bound to this repo:
#
#       gcloud iam workload-identity-pools create "github" \
#         --project="${GCP_PROJECT_ID}" --location="global" \
#         --display-name="GitHub Actions Pool"
#
#       gcloud iam workload-identity-pools providers create-oidc "github-provider" \
#         --project="${GCP_PROJECT_ID}" --location="global" \
#         --workload-identity-pool="github" \
#         --display-name="GitHub OIDC" \
#         --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#         --attribute-condition="assertion.repository == 'OWNER/REPO'" \
#         --issuer-uri="https://token.actions.githubusercontent.com"
#
#  2. Create a service account for CI and bind it (BigQuery Data Viewer + Job
#     User is enough — the smoke only READS Gold tables, never writes):
#
#       gcloud iam service-accounts create sa-dashboard-smoke-ci \
#         --project="${GCP_PROJECT_ID}"
#
#       gcloud projects add-iam-policy-binding "${GCP_PROJECT_ID}" \
#         --member="serviceAccount:sa-dashboard-smoke-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
#         --role="roles/bigquery.dataViewer"
#       gcloud projects add-iam-policy-binding "${GCP_PROJECT_ID}" \
#         --member="serviceAccount:sa-dashboard-smoke-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
#         --role="roles/bigquery.jobUser"
#
#  3. Allow the WIF provider to impersonate that SA from this repo only:
#
#       gcloud iam service-accounts add-iam-policy-binding \
#         "sa-dashboard-smoke-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
#         --role="roles/iam.workloadIdentityUser" \
#         --member="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github/attribute.repository/OWNER/REPO"
#
#  4. Set repo-level variables (Settings → Secrets and variables → Actions → Variables):
#
#       GCP_PROJECT_ID                = your project id
#       GCP_WIF_PROVIDER              = projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github/providers/github-provider
#       GCP_SMOKE_SERVICE_ACCOUNT     = sa-dashboard-smoke-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com
#
#     (These are `vars.*`, not `secrets.*` — they aren't credentials, they're
#     references. The actual short-lived token is minted by WIF at job time.)
# ─────────────────────────────────────────────────────────────────────────────

name: Dashboard smoke

on:
  pull_request:
    paths:
      # Only run when something that could break the dashboard changed. Editing
      # docs or unrelated ingestion code shouldn't burn a CI minute on live BQ.
      - "src/embrapa_commodities/dashboard/**"
      - "scripts/dashboard_smoke.py"
      - "tests/test_dashboard_smoke.py"
      - "dbt/models/gold/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dashboard-smoke.yml"
  workflow_dispatch: {}  # allow manual re-run from the Actions tab

# WIF requires id-token: write so GitHub will mint an OIDC token for us.
permissions:
  contents: read
  id-token: write

jobs:
  smoke:
    # Skip on forks — they can't reach the WIF provider (intentional security
    # boundary). The workflow would just fail noisily without this guard.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SMOKE_SERVICE_ACCOUNT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python to the project version
        run: uv python install 3.12.11

      - name: Run dashboard smoke (live BigQuery)
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: make test-smoke

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-smoke-server-log
          path: artifacts/dashboard_smoke_server.log
          if-no-files-found: ignore
