# Release: build + publish the webapi (React SPA + Flask) image to Artifact
# Registry. This DECOUPLES build from deploy — CI bakes a versioned, immutable
# image on every release; deploying to Cloud Run later is just pointing the
# service at that pre-built tag (no rebuild):
#
#   WEBAPI_SKIP_BUILD=1 WEBAPI_TAG=v1.2.3 bash deploy/webapi/deploy.sh
#
# Triggers:
#   • push of a tag matching v*   (e.g. `git tag v1.2.3 && git push origin v1.2.3`,
#     or publishing a GitHub Release, which creates the tag) → builds + pushes
#     `…/embrapa-dashboard:v1.2.3` AND `:latest`, then creates/updates the GitHub
#     Release whose body is the curated CHANGELOG.md `## [1.2.3]` section + the
#     deployable-image ref + an auto-generated PR appendix.
#   • workflow_dispatch (manual)  → builds + pushes `…/embrapa-dashboard:<version>`
#     for an ad-hoc version you type (no `:latest`, no GitHub Release).
#
# Same image as deploy/webapi/deploy.sh (the deploy/webapi/Dockerfile, repo-root
# context) — just built in the runner and pushed, instead of via Cloud Build.
#
# ── ONE-TIME GCP SETUP (reuses the WIF pool/provider that dbt-build-prod.yml
#    already created; only adds a release SA with Artifact Registry write) ──────
#
#   PROJECT_ID=<your project>
#   # 1) A dedicated, least-privilege CI release identity.
#   gcloud iam service-accounts create sa-release-ci \
#     --project="${PROJECT_ID}" --display-name="GitHub CI — build+push images"
#   # 2) Let it PUSH images to the Artifact Registry repo the webapi image lives in
#   #    (repo 'embrapa-services'; created on first manual deploy if absent).
#   gcloud artifacts repositories add-iam-policy-binding embrapa-services \
#     --project="${PROJECT_ID}" --location=us-central1 \
#     --member="serviceAccount:sa-release-ci@${PROJECT_ID}.iam.gserviceaccount.com" \
#     --role="roles/artifactregistry.writer"
#   # 3) Let THIS repo's Actions impersonate it via the existing WIF pool.
#   PROJECT_NUMBER=$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)')
#   gcloud iam service-accounts add-iam-policy-binding \
#     "sa-release-ci@${PROJECT_ID}.iam.gserviceaccount.com" --project="${PROJECT_ID}" \
#     --role="roles/iam.workloadIdentityUser" \
#     --member="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github/attribute.repository/igorrflorentino/embrapa-dashboard-produtos-agricolas"
#   # 4) Repo → Settings → Secrets and variables → Actions → Variables:
#   #      GCP_RELEASE_SERVICE_ACCOUNT = sa-release-ci@${PROJECT_ID}.iam.gserviceaccount.com
#   #    (GCP_PROJECT_ID + GCP_WIF_PROVIDER already exist from dbt-build-prod.yml.)
#   #    Optional overrides (defaults shown): WEBAPI_REGION=us-central1,
#   #      WEBAPI_AR_REPO=embrapa-services, WEBAPI_SERVICE_NAME=embrapa-dashboard.

name: Release image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to build + push (e.g. v1.2.3 or a build label)'
        required: true
        type: string

# One build per ref; don't cancel a release build mid-flight (the pushed image
# should always be complete).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# id-token: write → mint the OIDC token for keyless WIF auth.
# contents: write → create the GitHub Release on a tag build.
permissions:
  contents: write
  id-token: write

jobs:
  # Quality gate BEFORE building the prod image. A `v*` tag can point at ANY commit
  # (not only a CI-green main tip) and ci.yml runs on push/PR to main, NOT on tag
  # refs — so without this, a tag on an un-tested commit would publish a deployable
  # `:latest` that bypassed every check (INFRA-1). Runs the credential-free subset
  # (ruff + pytest + ESLint + vitest). sqlfluff and dbt-unit-tests are excluded here
  # because they need the WIF/BigQuery warehouse connection (dbt *parse* is
  # credential-free — ci.yml runs it with no warehouse — and could optionally be
  # added to this gate). This gate is a tag-time lint/test guard for the IMAGE build
  # only; the image ships no dbt models, so dbt-model correctness is enforced instead
  # by ci.yml on push/PR to main and by the post-merge dbt-build-prod.
  # build-and-push `needs:` this, so a red gate blocks the image.
  gate:
    name: Gate (lint + tests)
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12.11"

      - name: Install uv (with cache keyed on uv.lock)
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies (reproducible via uv.lock)
        run: uv sync --frozen

      - name: Lint (ruff check + ruff format --check)
        run: make lint

      - name: Test (pytest)
        run: make test

      - name: Set up Node 22 (npm cache keyed on the lockfile)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install (reproducible via package-lock.json)
        working-directory: frontend
        run: npm ci

      - name: Frontend lint + test (ESLint + Vitest)
        working-directory: frontend
        run: npm run lint && npm test

  build-and-push:
    name: Build + push image
    # Gate first: never publish a prod image from a commit that failed lint/tests.
    needs: gate
    # Forks can't reach the WIF provider (security boundary).
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # version: the pushed tag (refs/tags/vX → vX) or the manual input.
      # is_tag: only a real `v*` tag release also moves `:latest` + cuts a Release.
      - name: Resolve version + image refs
        id: vars
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.WEBAPI_REGION || 'us-central1' }}
          AR_REPO: ${{ vars.WEBAPI_AR_REPO || 'embrapa-services' }}
          SERVICE_NAME: ${{ vars.WEBAPI_SERVICE_NAME || 'embrapa-dashboard' }}
          # Pass the free-text manual-dispatch input via env, NOT interpolated into
          # the script: a `${{ }}` expansion would splice the raw value into the
          # shell text, so a value with metacharacters could inject commands.
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"; IS_TAG=false
          else
            VERSION="${GITHUB_REF_NAME}"; IS_TAG=true
          fi
          # The version becomes a Docker image tag, so constrain it to tag-safe
          # characters — this also hard-stops any injection attempt at the source.
          if ! printf '%s' "$VERSION" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "ERROR: invalid version '$VERSION' (allowed: letters, digits, . _ -)" >&2
            exit 1
          fi
          HOST="${REGION}-docker.pkg.dev"
          BASE="${HOST}/${PROJECT_ID}/${AR_REPO}/${SERVICE_NAME}"
          {
            echo "version=${VERSION}"
            echo "host=${HOST}"
            echo "image=${BASE}:${VERSION}"
            echo "image_latest=${BASE}:latest"
            echo "is_tag=${IS_TAG}"
          } >> "$GITHUB_OUTPUT"
          echo "Building ${BASE}:${VERSION} (is_tag=${IS_TAG})"

      - name: Auth to GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_RELEASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      # Docker login to Artifact Registry with the short-lived access token —
      # no gcloud needed, no long-lived key.
      - name: Docker login to Artifact Registry
        run: |
          echo '${{ steps.auth.outputs.access_token }}' \
            | docker login -u oauth2accesstoken --password-stdin "${{ steps.vars.outputs.host }}"

      # Same image as deploy/webapi/deploy.sh: deploy/webapi/Dockerfile, repo-root
      # context. Build once, push the version tag; also move :latest on a real
      # tag release (an ad-hoc workflow_dispatch build never touches :latest).
      - name: Build + push image
        run: |
          IMAGE='${{ steps.vars.outputs.image }}'
          docker build -f deploy/webapi/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          if [ '${{ steps.vars.outputs.is_tag }}' = 'true' ]; then
            LATEST='${{ steps.vars.outputs.image_latest }}'
            docker tag "$IMAGE" "$LATEST"
            docker push "$LATEST"
          fi

      - name: Job summary
        run: |
          {
            echo "### Release image published"
            echo ""
            echo "Pull/deploy this exact tag (no rebuild):"
            echo '```bash'
            echo "WEBAPI_SKIP_BUILD=1 WEBAPI_TAG=${{ steps.vars.outputs.version }} bash deploy/webapi/deploy.sh"
            echo '```'
            echo ""
            echo "- Image: \`${{ steps.vars.outputs.image }}\`"
            [ "${{ steps.vars.outputs.is_tag }}" = "true" ] && echo "- Also tagged: \`${{ steps.vars.outputs.image_latest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # Only for real `v*` tag releases: cut the GitHub Release. CHANGELOG.md is the
      # single source of truth — the body LEADS with the curated `## [X.Y.Z]` section
      # for this version, then the deployable-image hint, then an auto-generated PR
      # appendix. So the Release renders the changelog (no double-maintenance) and
      # still credits the PRs. Falls back to the PR list alone if the version has no
      # CHANGELOG section yet.
      - name: Create GitHub Release
        if: steps.vars.outputs.is_tag == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.vars.outputs.version }}
          IMAGE: ${{ steps.vars.outputs.image }}
        run: |
          VER_NO_V="${VERSION#v}"
          NOTES="${RUNNER_TEMP}/release_notes.md"

          # 1) Lead with the curated "## [X.Y.Z]" CHANGELOG section (up to the next
          #    "## [" heading), then trim a trailing "---" separator. Placeholder if
          #    the version has no section yet (keeps the release from being empty).
          awk -v hdr="## [${VER_NO_V}]" '
            index($0, hdr) == 1 { insec = 1; print; next }
            insec && /^## \[/   { exit }
            insec               { print }
          ' CHANGELOG.md \
          | awk 'NF { last = NR } { buf[NR] = $0 }
                 END { n = last; if (buf[n] == "---") n--; for (i = 1; i <= n; i++) print buf[i] }' \
          > "$NOTES"
          if [ ! -s "$NOTES" ]; then
            echo "No CHANGELOG section for ${VER_NO_V}; release body will be the PR list only." >&2
            printf '_No hand-written CHANGELOG entry for %s — see the pull requests below._\n' "$VERSION" > "$NOTES"
          fi

          # 2) Deployable-image hint — operators deploy this exact tag, no rebuild.
          {
            printf '\n---\n\n'
            printf '**Deployable image (no rebuild):** `%s`\n\n' "$IMAGE"
            printf '```bash\nWEBAPI_SKIP_BUILD=1 WEBAPI_TAG=%s bash deploy/webapi/deploy.sh\n```\n' "$VERSION"
          } >> "$NOTES"

          # 3) Append the auto-generated PR list (generate-notes API). Best effort —
          #    never fail the release if it can't be generated.
          PR_NOTES="$(gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${VERSION}" --jq '.body' 2>/dev/null || true)"
          if [ -n "$PR_NOTES" ]; then
            { printf '\n---\n\n'; printf '%s\n' "$PR_NOTES"; } >> "$NOTES"
          fi

          # 4) Cut the Release with the composed body.
          gh release create "$VERSION" --title "$VERSION" --notes-file "$NOTES"
