# Auto-runs `dbt build --target prod` against BigQuery after merges to main
# that touch dbt models, and on demand via `workflow_dispatch`.
#
# This is the bridge between "PR merged, dbt code lives in main" and "the
# physical tables in `silver` / `gold` reflect that code". Without it, a
# PR that adds a new model or column can be merged while the matching
# BigQuery table is missing — surfacing only on the next downstream read.
#
# Trigger model:
#   • push to main + paths filter on dbt/** → runs automatically after merge
#   • workflow_dispatch                      → manual fix-up runs (e.g. to
#                                              materialize tables for a
#                                              still-open PR, or to opt
#                                              into --full-refresh)
#
# Snapshot policy: this workflow runs PLAIN `dbt build --target prod` —
# NOT `make dbt-build-prod-with-backup`. CLAUDE.md keeps the with-backup
# variant intentionally manual ("Operator responsibility: run
# dbt-build-prod-with-backup at least once per release boundary") so
# automated runs don't accumulate GCS snapshots. Operators still snapshot
# at meaningful release boundaries from their terminal.
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME GCP SETUP (do this once per repo, then this workflow is hands-off):
#
#  1. Create a dedicated CI service account with write access to the Gold +
#     Silver datasets:
#
#       gcloud iam service-accounts create sa-dbt-build-ci \
#         --project="${GCP_PROJECT_ID}" \
#         --display-name="dbt build prod (GitHub Actions CI)"
#
#  2. Grant the BigQuery roles dbt needs to read Bronze, write Silver/Gold,
#     issue query jobs, and stream rows back via the Storage API. Granting
#     dataEditor at the project level is the simplest correct scope —
#     narrowing per-dataset is also valid if your org requires it.
#
#       gcloud projects add-iam-policy-binding "${GCP_PROJECT_ID}" \
#         --member="serviceAccount:sa-dbt-build-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
#         --role="roles/bigquery.dataEditor"
#       gcloud projects add-iam-policy-binding "${GCP_PROJECT_ID}" \
#         --member="serviceAccount:sa-dbt-build-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
#         --role="roles/bigquery.jobUser"
#       gcloud projects add-iam-policy-binding "${GCP_PROJECT_ID}" \
#         --member="serviceAccount:sa-dbt-build-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
#         --role="roles/bigquery.readSessionUser"
#
#  3. Set up a GitHub Workload Identity Pool (one-time per repo) and bind the
#     pool to this SA so GitHub Actions can impersonate it via OIDC:
#
#       PROJECT_NUMBER=$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectNumber)')
#       gcloud iam workload-identity-pools create github \
#         --project="${GCP_PROJECT_ID}" --location="global" \
#         --display-name="GitHub Actions"
#       gcloud iam workload-identity-pools providers create-oidc github-provider \
#         --project="${GCP_PROJECT_ID}" --location="global" \
#         --workload-identity-pool="github" \
#         --display-name="GitHub OIDC" \
#         --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#         --issuer-uri="https://token.actions.githubusercontent.com"
#       gcloud iam service-accounts add-iam-policy-binding \
#         "sa-dbt-build-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
#         --role="roles/iam.workloadIdentityUser" \
#         --member="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github/attribute.repository/OWNER/REPO"
#
#  4. Set repo-level variables (Settings → Secrets and variables → Actions
#     → Variables):
#
#       GCP_PROJECT_ID                  = your project id
#       GCP_WIF_PROVIDER                = projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github/providers/github-provider
#       BQ_LOCATION                     = e.g. us-central1 (falls back to us-central1 if unset)
#       GCP_DBT_BUILD_SERVICE_ACCOUNT   = sa-dbt-build-ci@${GCP_PROJECT_ID}.iam.gserviceaccount.com
#       DBT_ENABLE_CURATION             = "true" AFTER the one-time prod curation
#                                         activation (docs/operations_runbook.md);
#                                         unset/anything else = off. Adds
#                                         --vars 'enable_curation: true' so the
#                                         gated SCD2 curation views keep being
#                                         rebuilt + tested by every push-triggered
#                                         and scheduled build.
#
# ─────────────────────────────────────────────────────────────────────────────
# MATERIALIZING TABLES FOR A STILL-OPEN PR:
#
#  If a PR introduces a new model whose physical BigQuery table needs to
#  exist before downstream tooling can read it (e.g. for a future smoke test
#  or downstream report), run this workflow manually before the PR merges:
#
#    1. Make sure the workflow file (this one) is on main. If not, merge the
#       PR that adds it first.
#    2. Go to Actions → "dbt build prod" → Run workflow. Pick main. Wait
#       for the run to complete (typically ~3–5 min).
#    3. Downstream readers (Looker Studio, ad-hoc queries, future UI) can
#       now see the new table.

name: dbt build prod

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
      - 'src/embrapa_dashboard/config.py'  # Settings defaults consumed by dbt env_var()
      - '.github/workflows/dbt-build-prod.yml'
  schedule:
    # Daily prod build so INGESTED Bronze reaches Silver/Gold automatically —
    # the ingestion Job only writes Bronze, nothing here rebuilds the marts
    # between dbt-code pushes. This carries BOTH the nightly delta AND the
    # monthly `reconcile` deep-refresh through to the dashboard. 11:30 UTC =
    # 08:30 BRT: after the 05:00 BRT nightly ingest (1h max) has landed and
    # after the 11:00 UTC freshness check. A PLAIN (non --full-refresh) build is
    # enough — silver_ibge_pevs re-scans Bronze by ingestion_timestamp, not by
    # year, so an upstream correction to an OLD year flows all the way to Gold.
    - cron: '30 11 * * *'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Add --full-refresh (rebuild incremental models like silver_ibge_pevs from scratch). Default off — opt in only after schema changes or partition re-anchoring.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Never run two prod builds in parallel — they would race on the same
# physical tables. Don't cancel a running build either; mid-build cancels
# can leave Silver/Gold in inconsistent state. Queue new pushes instead.
concurrency:
  group: dbt-build-prod
  cancel-in-progress: false

# WIF needs id-token: write so GitHub mints an OIDC token for the auth step.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    # Skip on forks — they can't reach the WIF provider (security boundary).
    # Skipped jobs satisfy required status checks in GitHub.
    if: github.event.repository.fork == false

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Auth to GCP via Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DBT_BUILD_SERVICE_ACCOUNT }}

      # Pin to the exact interpreter required by pyproject.toml
      # (requires-python = "==3.12.*").
      - name: Set up Python 3.12.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12.11"

      - name: Install uv (with cache keyed on uv.lock)
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # --frozen makes the sync fail if uv.lock drifts from pyproject.toml.
      # dbt-core + dbt-bigquery are project dependencies; no extras needed.
      - name: Sync dependencies
        run: uv sync --frozen

      # Inline profile — does NOT use impersonate_service_account because
      # WIF has already authenticated us AS the dbt-build SA. The example
      # profile (dbt/profiles.yml.example) hard-codes impersonation for
      # local dev where users authenticate as themselves; that flag would
      # short-circuit our WIF identity here.
      - name: Generate dbt profile (oauth via ADC from WIF)
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION || 'us-central1' }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          embrapa_dashboard:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: ${GCP_PROJECT_ID}
                dataset: prod
                location: ${BQ_LOCATION}
                threads: 8
                job_execution_timeout_seconds: 600
                job_retries: 1
                priority: batch
          EOF

      - name: dbt deps (install dbt_utils)
        working-directory: dbt
        run: uv run dbt deps

      # `dbt build` runs models + tests in dependency order. With --target
      # prod we write to the `silver` and `gold` datasets (per
      # BQ_*_DATASET defaults in dbt_project.yml). All gold_* tables are
      # `materialized=table` so they fully rebuild every run — picking up
      # any new columns from the merged PRs automatically.
      #
      # The full_refresh input is for cases where an incremental model
      # (silver_ibge_pevs) needs a re-anchor — e.g. after schema or
      # partition-key changes upstream.
      #
      # The DBT_ENABLE_CURATION repo variable (default off) gates the SCD2
      # curation view (dim_code_industrialization_scd2,
      # `enabled=var('enable_curation', false)`). Flip it to "true" after the
      # one-time prod activation (docs/operations_runbook.md § Activating
      # curation in prod) so merged changes to that view — and its schema
      # tests — keep propagating on every automated build.
      - name: dbt build prod
        working-directory: dbt
        # dbt_project.yml resolves its datasets + BCB inflation/currency series
        # codes via env_var(<name>, <default>) — those read the PROCESS env, not
        # .env (which doesn't exist in CI). Set them explicitly so a change to the
        # prod config via repo variables takes effect instead of silently using the
        # baked-in defaults. The `|| '<default>'` fallbacks mirror dbt_project.yml,
        # so leaving the repo vars unset keeps the current (default) behaviour.
        env:
          BQ_SILVER_DATASET: ${{ vars.BQ_SILVER_DATASET || 'silver' }}
          BQ_GOLD_DATASET: ${{ vars.BQ_GOLD_DATASET || 'gold' }}
          BQ_SERVING_DATASET: ${{ vars.BQ_SERVING_DATASET || 'serving' }}
          BCB_INFLATION_SERIES_IPCA_CODE: ${{ vars.BCB_INFLATION_SERIES_IPCA_CODE || '433' }}
          BCB_INFLATION_SERIES_IGPM_CODE: ${{ vars.BCB_INFLATION_SERIES_IGPM_CODE || '189' }}
          BCB_INFLATION_SERIES_IGPDI_CODE: ${{ vars.BCB_INFLATION_SERIES_IGPDI_CODE || '190' }}
          BCB_CURRENCY_SERIES: ${{ vars.BCB_CURRENCY_SERIES || '1:USD,21619:EUR' }}
        run: |
          ARGS=(build --target prod)
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            echo "::notice::Running with --full-refresh (incremental models will rebuild from scratch)"
            ARGS+=(--full-refresh)
          fi
          if [ "${{ vars.DBT_ENABLE_CURATION }}" = "true" ]; then
            echo "::notice::DBT_ENABLE_CURATION=true — building the gated SCD2 curation views"
            ARGS+=(--vars 'enable_curation: true')
          fi
          uv run dbt "${ARGS[@]}"

      # Curadoria lifecycle: auto-mark orphan produtos (removed from the catalog but
      # with Gold data still lingering) as Descontinuado, on the build boundary — orphan
      # status only changes when Gold or the catalog change, both of which happen here, so
      # no separate scheduler is needed. NON-DESTRUCTIVE (the purge is a human-gated CLI).
      # Best-effort: needs the `webapi` extra (the cache for the memoized reads) and must
      # NOT fail the build (the marts are already rebuilt) — continue-on-error.
      - name: Mark orphan produtos (Curadoria lifecycle)
        if: success()
        continue-on-error: true
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION || 'us-central1' }}
          BQ_GOLD_DATASET: ${{ vars.BQ_GOLD_DATASET || 'gold' }}
          BQ_RESEARCH_INPUTS_DATASET: ${{ vars.BQ_RESEARCH_INPUTS_DATASET || 'research_inputs' }}
        run: uv run --extra webapi embrapa mark-orphans

      # Alerting (intentionally GitHub-native, like dbt-source-freshness.yml): this
      # build is the ONLY stage that carries Bronze → the Silver/Gold/serving marts
      # the dashboard reads, so a silent failure here leaves the marts STALE while
      # the freshness check keeps PASSING (Bronze is fresh; only the marts lag), and
      # `dbt build` runs tests inline so one failing test now also blocks the
      # rebuild. A failed SCHEDULED run emails the user who last edited the cron on
      # the default branch (GitHub's documented notification) — that is the page.
      # This step makes it LOUD + actionable in the run's Job Summary too, so a red
      # nightly build names the stale-marts consequence up front instead of just a
      # red dot in the Actions tab. (To add a secondary channel — Slack, an
      # auto-filed Issue — extend this `if: failure()` step.)
      - name: Flag stale marts on failure
        if: failure()
        run: |
          {
            echo "## 🚨 prod dbt build FAILED — serving marts may be STALE"
            echo ""
            echo "Bronze is unaffected (and source-freshness will keep passing), but"
            echo "Silver/Gold/serving did **not** finish rebuilding, so the dashboard"
            echo "may serve data from the previous successful build until this is fixed."
            echo ""
            echo "**Check:** the failing step's log above — a dbt **test** failure (run"
            echo "inline by \`dbt build\`) also blocks the model rebuild. Re-run after the"
            echo "fix; use the \`full_refresh\` dispatch input only after schema changes."
          } >> "$GITHUB_STEP_SUMMARY"
