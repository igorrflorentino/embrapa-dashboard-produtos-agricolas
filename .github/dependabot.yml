# Dependabot keeps the SHA-pinned GitHub Actions current. The workflows pin every
# action to a full commit SHA (with a `# vX` comment) to prevent a moving-tag
# supply-chain attack; Dependabot then bumps those SHAs (and the comment) when a
# new release ships, so pinning doesn't mean going stale. Weekly is plenty for an
# internal batch/dashboard project.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One grouped PR per week instead of one per action — less review churn.
      github-actions:
        patterns:
          - "*"

  # Python deps (pyproject.toml + uv.lock). Keeps the ingestion/transform/webapi
  # libraries current with security + feature bumps; grouped into one weekly PR.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      python:
        patterns:
          - "*"

  # Frontend deps (frontend/package.json + package-lock.json). The bundle ships
  # plotly + maplibre, so security bumps matter; grouped into one weekly PR.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      npm:
        patterns:
          - "*"

  # Cloud Run image base layers (deploy/*/Dockerfile). Both pin python:3.12-slim /
  # node:22-slim by floating tag; the docker updater bumps the pinned base (and,
  # once digest-pinned, the @sha256 digest) so a base-image CVE surfaces as a PR
  # instead of going stale — the container analogue of the pip/npm updaters above.
  # One updater per Dockerfile directory.
  - package-ecosystem: docker
    directory: /deploy/webapi
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    ignore:
      # The project is hard-pinned to Python 3.12 (`requires-python == "3.12.*"`,
      # `.python-version` 3.12.11, ruff `target-version = py312`), so a 3.13/3.14
      # base image would break `uv sync` inside the container. Stay on 3.12 —
      # patch/digest bumps still flow, and node base bumps are unaffected.
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
  - package-ecosystem: docker
    directory: /deploy/ingestion
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    ignore:
      # See the webapi updater above — pinned to Python 3.12.
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
