# Local-only pre-commit hooks. Install with:
#   make precommit-install
# Then every `git commit` runs ruff (format + lint) and basic file-hygiene
# checks. SQL/dbt linting via sqlfluff is left manual (sqlfluff-dbt requires
# a live BigQuery profile, which would slow every commit by several seconds).
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
