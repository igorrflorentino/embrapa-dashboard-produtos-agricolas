# Local-only pre-commit hooks. Install with:
#   make precommit-install
# Then every `git commit` runs ruff (format + lint) and basic file-hygiene
# checks. SQL/dbt linting via sqlfluff is left manual (sqlfluff-dbt requires
# a live BigQuery profile, which would slow every commit by several seconds).
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Soft 500-LOC ceiling for dashboard modules (2026-05 audit § 2.1).
  # Two files are grandfathered via ALLOWLIST in the script; new files
  # or modifications that push a file over 500 LOC fail here. Edit
  # scripts/check_dashboard_size.py to adjust the allowlist.
  - repo: local
    hooks:
      - id: check-dashboard-size
        name: Soft 500-LOC ceiling for dashboard modules
        entry: python scripts/check_dashboard_size.py
        language: system
        files: ^src/embrapa_commodities/dashboard/.*\.py$
        pass_filenames: true
