# Local-only pre-commit hooks. Install with:
#   make precommit-install
# Then every `git commit` runs ruff (format + lint) and basic file-hygiene
# checks. SQL/dbt linting via sqlfluff is left manual (sqlfluff-dbt requires
# a live BigQuery profile, which would slow every commit by several seconds).
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Keep `rev` in step with the `ruff` pin resolved in uv.lock (CI runs the synced
  # ruff). Dependabot has no pre-commit updater, so bump this by hand (or via
  # `pre-commit autoupdate`) when the dev-group ruff moves — a drifted hook would
  # format/lint differently than CI.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Guard the immutable GCP project id against the bulk-rename corruption that hit it
  # in v1.10.8 (an agent find/replaced it into `embrapa-…-produtos agrícolas` — a space
  # + accent form that is not a valid GCP id and broke every IAM/bq command). Fails the
  # commit if any file reintroduces an `embrapa-…agrícolas` id-shaped token (accented).
  # The valid GitHub repo name uses ASCII `agricolas` (no accent) and does NOT match.
  - repo: local
    hooks:
      - id: forbid-corrupted-gcp-id
        name: forbid corrupted GCP project id (accented embrapa-* identifier)
        language: pygrep
        entry: 'embrapa[a-z]*-[a-z0-9 -]*agrícolas'
        types: [text]
        exclude: '^\.pre-commit-config\.yaml$'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
