<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embrapa · Inteligência de Mercado · Commodities</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="dashboard.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="Charts.jsx"></script>
  <script type="text/babel" src="DataTable.jsx"></script>
  <script type="text/babel" src="FilterBar.jsx"></script>
  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel" src="MainScreen.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [route, setRoute] = useState('overview');
      const [filters, setFilters] = useState({
        period: 'Tudo',
        product: 'all',
        uf: 'all',
        conv: 'ipca',
        ccy: 'BRL',
        onlyOK: true,
      });

      return (
        <window.AppShell route={route} setRoute={setRoute}>
          <window.FilterBar filters={filters} setFilters={setFilters} />
          <window.MainScreen filters={filters} />
        </window.AppShell>
      );
    }

    function boot() {
      if (!window.AppShell || !window.MainScreen || !window.FilterBar) {
        return setTimeout(boot, 30);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }
    boot();
  </script>
</body>
</html>
