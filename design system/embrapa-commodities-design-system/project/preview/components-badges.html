<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font: 500 11px var(--font-body); }
  .chip.ok { background: rgba(0,111,53,0.10); color: var(--embrapa-green-darker); }
  .chip.warn { background: rgba(183,121,31,0.12); color: #8B5A14; }
  .chip.err { background: rgba(178,58,43,0.10); color: #8E2A1E; }
  .chip.info { background: rgba(6,97,124,0.10); color: var(--embrapa-blue-darker); }
  .chip.muted { background: var(--bg-surface-3); color: var(--fg-3); }
  .chip.brand-emp { background: var(--embrapa-orange); color: #fff; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge-count { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: var(--embrapa-green); color: #fff; font: 500 10px var(--font-mono); }
  .tag-rect { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-xs); font: 500 11px var(--font-mono); letter-spacing: 0.04em; background: var(--bg-surface-2); color: var(--fg-2); border: 1px solid var(--border-default); }
</style>
</head>
<body>
  <span class="chip ok"><span class="dot"></span>OK</span>
  <span class="chip warn"><span class="dot"></span>MISSING_VALUE</span>
  <span class="chip err"><span class="dot"></span>INCOMPLETE</span>
  <span class="chip info"><span class="dot"></span>MISSING_QUANTITY</span>
  <span class="chip muted">data_quality_flag</span>
  <span class="chip brand-emp">Empregados</span>
  <span class="badge-count">3</span>
  <span class="badge-count" style="background: var(--status-error);">12</span>
  <span class="tag-rect">IBGE • PEVS</span>
  <span class="tag-rect">BCB • SGS 433</span>
  <span class="tag-rect" style="background: rgba(0,111,53,0.06); color: var(--embrapa-green-darker); border-color: rgba(0,111,53,0.2);">val_real_ipca_brl</span>
</body>
</html>
