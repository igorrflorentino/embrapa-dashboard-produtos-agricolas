<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .name { font-size: 12px; font-weight: 500; color: var(--fg-1); line-height: 1.2; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .group-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; font-weight: 500;}
</style>
</head>
<body>
  <div class="group-label">Corporate palette · Manual de Identidade Visual</div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#006f35"></div><div class="name">Verde Embrapa</div><div class="hex">#006F35</div></div>
    <div class="sw"><div class="chip" style="background:#005529"></div><div class="name">Verde escuro</div><div class="hex">#005529</div></div>
    <div class="sw"><div class="chip" style="background:#003c1d"></div><div class="name">Verde profundo</div><div class="hex">#003C1D</div></div>
    <div class="sw"><div class="chip" style="background:#00763d"></div><div class="name">Verde claro UI</div><div class="hex">#00763D</div></div>
    <div class="sw"><div class="chip" style="background:#06617c"></div><div class="name">Azul Embrapa</div><div class="hex">#06617C</div></div>
    <div class="sw"><div class="chip" style="background:#004993"></div><div class="name">Azul institucional</div><div class="hex">#004993</div></div>
    <div class="sw"><div class="chip" style="background:#0e3b65"></div><div class="name">Azul profundo</div><div class="hex">#0E3B65</div></div>
    <div class="sw"><div class="chip" style="background:#cddee9"></div><div class="name">Azul pálido</div><div class="hex">#CDDEE9</div></div>
  </div>
</body>
</html>
