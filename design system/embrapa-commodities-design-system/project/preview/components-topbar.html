<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 0; }
  .topbar {
    height: 56px; background: var(--embrapa-green); display: flex; align-items: center;
    padding: 0 24px; gap: 24px; color: #fff;
  }
  .brand { font-style: italic; font-weight: 700; font-size: 20px; letter-spacing: -0.01em; }
  .sep { width: 1px; height: 24px; background: rgba(255,255,255,0.25);}
  .product { font-size: 13px; opacity: 0.95; }
  .nav { display: flex; gap: 22px; margin-left: 12px; }
  .nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 13px; padding: 4px 0; }
  .nav a.active { color: #fff; border-bottom: 2px solid #fff; padding-bottom: 14px; margin-bottom: -16px; }
  .util { margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 12px; color: rgba(255,255,255,0.85); }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.18); display:inline-flex; align-items:center; justify-content:center; font-size: 11px; font-weight: 500;}
  .crumb { padding: 12px 24px; font-size: 12px; color: var(--fg-3); border-bottom: 1px solid var(--border-subtle); }
  .crumb a { color: var(--fg-3); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Embrapa</div>
    <div class="sep"></div>
    <div class="product">Inteligência de Mercado — Commodities</div>
    <div class="nav">
      <a href="#" class="active">Visão geral</a>
      <a href="#">Produto</a>
      <a href="#">Geografia</a>
      <a href="#">Qualidade</a>
    </div>
    <div class="util">
      <span>BRL · IPCA</span>
      <span class="avatar">IF</span>
    </div>
  </div>
  <div class="crumb"><a href="#">Dashboards</a> &nbsp;›&nbsp; <a href="#">Commodities</a> &nbsp;›&nbsp; Visão geral</div>
</body>
</html>
