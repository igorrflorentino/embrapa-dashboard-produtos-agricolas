<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  th { text-align: left; font: 500 11px var(--font-body); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); padding: 10px 12px; border-bottom: 1px solid var(--border-default); background: var(--bg-surface-2); }
  td { font: 400 13px var(--font-body); padding: 10px 12px; border-bottom: 1px solid var(--border-subtle); color: var(--fg-2); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg-surface-2); }
  .num { font-family: var(--font-mono); text-align: right; font-variant-numeric: tabular-nums; color: var(--fg-1); }
  th.num { text-align: right; }
  .chip { display: inline-flex; padding: 2px 8px; border-radius: 999px; font: 500 10px var(--font-body); }
  .chip.ok { background: rgba(0,111,53,0.10); color: var(--embrapa-green-darker); }
  .chip.warn { background: rgba(183,121,31,0.12); color: #8B5A14; }
</style>
</head>
<body>
  <table>
    <thead>
      <tr><th>Estado</th><th>Produto</th><th class="num">Quantidade (t)</th><th class="num">Valor real (R$)</th><th>Flag</th></tr>
    </thead>
    <tbody>
      <tr><td>PA</td><td>Castanha-do-pará</td><td class="num">14.829</td><td class="num">82.471.220</td><td><span class="chip ok">OK</span></td></tr>
      <tr><td>AM</td><td>Castanha-do-pará</td><td class="num">9.314</td><td class="num">51.038.910</td><td><span class="chip ok">OK</span></td></tr>
      <tr><td>AC</td><td>Castanha-do-pará</td><td class="num">3.207</td><td class="num">—</td><td><span class="chip warn">MISSING_VALUE</span></td></tr>
      <tr><td>RO</td><td>Castanha-do-pará</td><td class="num">2.118</td><td class="num">11.092.480</td><td><span class="chip ok">OK</span></td></tr>
    </tbody>
  </table>
</body>
</html>
