<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .lbl { font-size: 12px; font-weight: 500; color: var(--fg-2); }
  .hint { font-size: 11px; color: var(--fg-3); }
  input, select {
    height: 36px; padding: 0 12px; font: 400 14px var(--font-body);
    border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    background: #fff; color: var(--fg-1);
    transition: border-color var(--dur-fast);
  }
  input:focus, select:focus { outline: none; border-color: var(--embrapa-blue); border-width: 2px; padding: 0 11px; height: 36px; }
  input.error { border-color: var(--status-error); }
  .group { display: flex; align-items: center; gap: 8px; }
  .check { width: 16px; height: 16px; border: 1.5px solid var(--border-strong); border-radius: 3px; background: #fff; display: inline-flex; align-items: center; justify-content: center; }
  .check.on { background: var(--embrapa-green); border-color: var(--embrapa-green); }
  .check.on::after { content: ""; width: 8px; height: 4px; border: 2px solid #fff; border-top: none; border-right: none; transform: rotate(-45deg) translate(0px,-1px); }
  .radio { width: 16px; height: 16px; border: 1.5px solid var(--border-strong); border-radius: 50%; background: #fff; position: relative; }
  .radio.on { border-color: var(--embrapa-green); }
  .radio.on::after { content: ""; position: absolute; inset: 3px; background: var(--embrapa-green); border-radius: 50%; }
  .switch { width: 32px; height: 18px; background: var(--pres-gray-200); border-radius: 999px; position: relative; }
  .switch.on { background: var(--embrapa-green); }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; transition: left 200ms;}
  .switch.on::after { left: 16px; }
</style>
</head>
<body>
  <div class="field">
    <label class="lbl">Produto</label>
    <select><option>Castanha-do-pará</option><option>Madeira em tora</option></select>
    <span class="hint">IBGE PEVS — tabela 289</span>
  </div>
  <div class="field">
    <label class="lbl">Ano de referência</label>
    <input value="2023">
    <span class="hint">Intervalo: 1986–2023</span>
  </div>
  <div class="field">
    <label class="lbl">Estado (UF)</label>
    <input class="error" value="ZZ">
    <span class="hint" style="color: var(--status-error);">UF inválida — use sigla de 2 letras.</span>
  </div>
  <div class="field" style="gap: 10px;">
    <div class="group"><span class="check on"></span><span style="font-size:13px;">Inclui valores corrigidos por IPCA</span></div>
    <div class="group"><span class="radio on"></span><span style="font-size:13px;">val_real_ipca_brl</span></div>
    <div class="group"><span class="radio"></span><span style="font-size:13px;">val_yearfx_brl</span></div>
    <div class="group"><span class="switch on"></span><span style="font-size:13px;">Apenas data_quality_flag = OK</span></div>
  </div>
</body>
</html>
