<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }
  .label { width: 64px; flex-shrink: 0; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { background: var(--embrapa-green); height: 16px; border-radius: 2px; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-left: 10px; }
</style>
</head>
<body>
  <div class="row"><div class="label">space-1</div><div class="bar" style="width: 4px;"></div><div class="val">4 px</div></div>
  <div class="row"><div class="label">space-2</div><div class="bar" style="width: 8px;"></div><div class="val">8 px</div></div>
  <div class="row"><div class="label">space-3</div><div class="bar" style="width: 12px;"></div><div class="val">12 px</div></div>
  <div class="row"><div class="label">space-4</div><div class="bar" style="width: 16px;"></div><div class="val">16 px</div></div>
  <div class="row"><div class="label">space-5</div><div class="bar" style="width: 24px;"></div><div class="val">24 px · default gutter</div></div>
  <div class="row"><div class="label">space-6</div><div class="bar" style="width: 32px;"></div><div class="val">32 px</div></div>
  <div class="row"><div class="label">space-7</div><div class="bar" style="width: 48px;"></div><div class="val">48 px</div></div>
  <div class="row"><div class="label">space-8</div><div class="bar" style="width: 64px;"></div><div class="val">64 px · section gap</div></div>
  <div class="row"><div class="label">space-9</div><div class="bar" style="width: 96px;"></div><div class="val">96 px</div></div>
</body>
</html>
