<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .card { padding: 20px; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-bottom: 8px; }
  .brand { font-style: italic; font-weight: 700; font-size: 38px; color: var(--embrapa-green); letter-spacing: -0.02em; }
  .num { font-family: var(--font-mono); font-size: 28px; font-weight: 500; color: var(--fg-1); letter-spacing: -0.01em; }
  .small { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }
  .row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px dashed var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .tab { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">.brand-italic · Univers 85 Extra Black Italic</div>
    <div class="brand">Embrapa</div>
    <p class="caption" style="margin-top: 10px;">The wordmark cut. Hero / brand moments only — never body.</p>
  </div>
  <div class="card">
    <div class="label">Mono · tabular numerals</div>
    <div class="num tab">R$ 1.847.293,50</div>
    <div class="row tab"><span class="small">2021</span><span class="small">1.247.193 t</span></div>
    <div class="row tab"><span class="small">2022</span><span class="small">1.302.847 t</span></div>
    <div class="row tab"><span class="small">2023</span><span class="small">1.198.610 t</span></div>
  </div>
</body>
</html>
