<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { width: 80px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: var(--radius-md);
    font: 500 14px/1 var(--font-body);
    border: 1px solid transparent; cursor: pointer;
    transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast);
  }
  .btn-primary { background: var(--embrapa-green); color: #fff; }
  .btn-primary:hover { background: var(--embrapa-green-light); }
  .btn-secondary { background: #fff; color: var(--fg-1); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--bg-surface-2); }
  .btn-ghost { background: transparent; color: var(--embrapa-green); border-color: transparent; }
  .btn-ghost:hover { background: rgba(0,111,53,0.06); }
  .btn-danger { background: var(--status-error); color: #fff; }
  .btn-small { padding: 6px 10px; font-size: 12px; }
  .btn-large { padding: 14px 22px; font-size: 15px; }
  .btn-disabled { opacity: 0.4; pointer-events: none; }
  .icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">primary</div>
    <button class="btn btn-primary">Aplicar filtros</button>
    <button class="btn btn-primary"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Adicionar produto</button>
    <button class="btn btn-primary btn-disabled">Desabilitado</button>
  </div>
  <div class="row">
    <div class="label">secondary</div>
    <button class="btn btn-secondary">Limpar</button>
    <button class="btn btn-secondary"><svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Exportar CSV</button>
    <button class="btn btn-secondary btn-small">Cancelar</button>
  </div>
  <div class="row">
    <div class="label">ghost</div>
    <button class="btn btn-ghost">Ver detalhes</button>
    <button class="btn btn-ghost"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/></svg>Visualizar</button>
  </div>
  <div class="row">
    <div class="label">danger</div>
    <button class="btn btn-danger">Remover</button>
    <button class="btn btn-secondary" style="color: var(--status-error); border-color: rgba(178,58,43,0.3);">Reverter</button>
  </div>
</body>
</html>
