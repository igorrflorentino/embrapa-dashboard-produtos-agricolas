<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embrapa · Inteligência de Mercado · Commodities</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="dashboard.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="Charts.jsx"></script>
  <script type="text/babel" src="DataTable.jsx"></script>
  <script type="text/babel" src="FilterBar.jsx"></script>
  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel" src="MainScreen.jsx"></script>

  <style>
    /* Print-ready overrides — preserves brand color + chrome on paper. */
    html, body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    @page {
      size: A3 landscape;
      margin: 8mm;
    }

    @media print {
      /* Anchor everything to the printable area */
      html, body { background: #fff; }

      /* Topbar stays sticky on screen, but on paper we want it to flow. */
      .topbar {
        position: static !important;
        height: 48px !important;
      }

      /* Sidebar is interactive nav — not useful on paper. Collapse to a
         narrow institutional rail so the institutional chrome still reads. */
      .sidebar {
        min-height: 0 !important;
        padding: 8px 0 !important;
      }
      .sidebar .side-section,
      .sidebar .side-item { font-size: 10px !important; padding: 5px 12px !important; }
      .sidebar .side-item svg { width: 12px !important; height: 12px !important; }

      .body {
        grid-template-columns: 180px 1fr !important;
      }

      .content {
        padding: 16px 18px 24px !important;
        max-width: none !important;
      }
      .screen { gap: 14px !important; }

      /* Avoid splitting cards / KPI rows across pages */
      .kpi-card,
      .highlight,
      .card,
      .filterbar,
      .hero-meta,
      .conv {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* Hide interactive-only affordances */
      .icon-btn,
      .meta-actions { display: none !important; }

      /* Slightly tighten typography for print density */
      .page-title { font-size: 24px !important; margin: 4px 0 6px !important; }
      .page-sub   { font-size: 12px !important; }
      .kpi-val    { font-size: 22px !important; }
      .section-title { font-size: 17px !important; }

      /* Charts shrink a little so a card pair fits a single page */
      .chart { max-height: 220px; }

      /* Footer prints at the bottom of the last page only */
      .footer {
        break-before: avoid;
        padding: 14px 18px !important;
      }

      /* Links: keep them readable but not loud */
      a { color: var(--fg-2) !important; text-decoration: none !important; }

      /* No hover/animation surprises */
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [route, setRoute] = useState('overview');
      const [filters, setFilters] = useState({
        period: 'Tudo',
        product: 'all',
        uf: 'all',
        conv: 'ipca',
        ccy: 'BRL',
        onlyOK: true,
      });

      return (
        <window.AppShell route={route} setRoute={setRoute}>
          <window.FilterBar filters={filters} setFilters={setFilters} />
          <window.MainScreen filters={filters} />
        </window.AppShell>
      );
    }

    function boot() {
      if (!window.AppShell || !window.MainScreen || !window.FilterBar) {
        return setTimeout(boot, 30);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);

      // Wait for fonts + a settle delay, then trigger print.
      const triggerPrint = () => {
        const fontsReady = document.fonts ? document.fonts.ready : Promise.resolve();
        fontsReady.then(() => {
          setTimeout(() => window.print(), 500);
        });
      };
      // Give React a tick to paint before we kick off the font wait.
      requestAnimationFrame(() => requestAnimationFrame(triggerPrint));
    }
    boot();
  </script>
</body>
</html>
