version: 2

models:
  - name: silver_ibge_pevs
    description: "PEVS extractive production cleaned, typed, deduplicated, with per-unit flags."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - city_code
              - product_code
              - variable_code
              - unit_of_measure
    columns:
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1986 and extract(year from current_date()) + 1"
      - name: state_acronym
        tests: [not_null]
      - name: product_code
        description: "Classification-193 code (e.g. 3405), taken directly from SIDRA's tipo_de_produto_extrativo_codigo."
        tests: [not_null]
      - name: variable_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["144", "145"]
      - name: numeric_value
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or numeric_value >= 0"

  - name: silver_bcb_inflation
    description: |
      Monthly inflation series with chain-linked 100-base index_value, so any
      historical Brazilian-currency amount can be deflated correctly.
    columns:
      - name: reference_date
        tests: [not_null]
      - name: series_code
        tests: [not_null]
      - name: monthly_pct_change
        description: "Variation % as published by BCB SGS (e.g. series 433, 189, 190)."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                # Brazilian monthly inflation has never exceeded ±100% in any month;
                # a wider range than necessary catches parse errors without
                # rejecting legitimate hyperinflation-era spikes.
                expression: "is null or monthly_pct_change between -100 and 100"

  - name: silver_bcb_currency
    description: "Daily FX rates: BRL per foreign currency unit (BCB SGS: USD, EUR)."
    columns:
      - name: reference_date
        tests: [not_null]
      - name: currency
        # Guards the series_code filter: only configured BCB FX currencies may
        # surface here. CNY is NOT a BCB series — it is seed-sourced via
        # silver_extfx_currency. A stale Bronze series leaking in would fail this.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [USD, EUR]
      - name: brl_per_foreign_unit
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or brl_per_foreign_unit > 0"

  - name: silver_comex_flows
    description: |
      MDIC Comex Stat flows cleaned, typed, deduplicated at the full source
      grain (flow × month × NCM × country × UF × transport route × customs
      office × statistical unit). VL_FOB/VL_FRETE/VL_SEGURO are nominal US$.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - flow
              - reference_year
              - reference_month
              - ncm_code
              - country_code
              - state_acronym
              - transport_route_code
              - customs_office_code
              - stat_unit_code
    columns:
      - name: flow
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["export", "import"]
      - name: reference_date
        tests: [not_null]
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1997 and extract(year from current_date()) + 1"
      - name: reference_month
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1 and 12"
      - name: ncm_code
        tests: [not_null]
      - name: val_fob_usd
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or val_fob_usd >= 0"

  - name: silver_comtrade_flows
    description: |
      UN Comtrade annual bilateral flows cleaned, typed, reduced to the canonical
      bilateral grain: one row per (flow, year, reporter, partner, cmd). Only the
      fully-aggregated Bronze record is kept (motCode=0, customsCode=C00,
      partner2Code=0, mosCode=0); the transport/customs/second-partner breakdowns
      sum INTO it, so re-summing them double-counts (~2.5×) — they are dropped.
      primary/cif/fob values are nominal US$. Products are HS6. The World partner
      (0) is dropped; flowCode is normalised X/M/RX/RM →
      export/import/re-export/re-import. Zero-quantity sentinels → NULL.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - flow
              - reference_year
              - reporter_code
              - partner_code
              - cmd_code
    columns:
      - name: flow
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["export", "import", "re-export", "re-import"]
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1960 and extract(year from current_date()) + 1"
      - name: reporter_code
        tests: [not_null]
      - name: partner_code
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "!= '0'"     # World aggregate dropped in Silver
      - name: cmd_code
        tests: [not_null]
      - name: family
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area", "desconhecida"]
      - name: primary_value_usd
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or primary_value_usd >= 0"
      - name: qty_base
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or qty_base >= 0"

  - name: silver_extfx_currency
    description: |
      Externally-sourced FX rates the BCB does not publish (currently BRL/CNY,
      from the ECB via the extfx_cny_brl seed). Shaped exactly like
      silver_bcb_currency so silver_currency can UNION them.
    columns:
      - name: currency
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["CNY"]
      - name: reference_date
        tests: [not_null]
      - name: brl_per_foreign_unit
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or brl_per_foreign_unit > 0"

  - name: silver_currency
    description: |
      Unified FX source for the Gold deflation: BCB SGS (USD, EUR) ∪ external
      (CNY). One row schema for every currency, so the Gold fx CTEs are
      currency-agnostic.
    columns:
      - name: currency
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["USD", "EUR", "CNY"]
      - name: brl_per_foreign_unit
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or brl_per_foreign_unit > 0"

unit_tests:
  # One quantity case per physical-unit family, plus a product-crosswalk
  # override case (saca: generic seed declares family=massa with NO factor; the
  # product_unit_factors row supplies to_base). Energia/contagem/area are not
  # present in real PEVS data, so the coverage is synthetic by design.
  - name: test_pevs_quantity_family_conversion
    model: silver_ibge_pevs
    # silver_ibge_pevs is incremental — test the full-refresh (else) branch.
    overrides:
      macros:
        is_incremental: false
    given:
      - input: source('bronze_ibge', 'sidra_raw')
        rows:
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0001", tipo_de_produto_extrativo: "1 - Massa", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "Toneladas",     valor: "120",  nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0002", tipo_de_produto_extrativo: "2 - Volume", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "Metros cúbicos", valor: "50",   nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0003", tipo_de_produto_extrativo: "3 - Energia", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "kWh",          valor: "5000", nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0004", tipo_de_produto_extrativo: "4 - Contagem", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "milheiro",     valor: "2",    nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0005", tipo_de_produto_extrativo: "5 - Area", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "alqueire",     valor: "50",   nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "9999", tipo_de_produto_extrativo: "9 - Saca", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "saca",          valor: "10",   nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
      - input: ref('historical_currency_factors')
        # One non-matching row just so the empty-join CTE has a known schema.
        rows:
          - {unit_of_measure: "Mil Reais", year_from: 1900, year_to: 1901, brl_factor: 1.0}
      - input: ref('unit_family_conversions')
        rows:
          - {unit_raw: "toneladas",      family: "massa",    base_unit: "t",   to_base: 1}
          - {unit_raw: "metros cúbicos", family: "volume",   base_unit: "m³",  to_base: 1}
          - {unit_raw: "kwh",            family: "energia",  base_unit: "MWh", to_base: 0.001}
          - {unit_raw: "milheiro",       family: "contagem", base_unit: "un",  to_base: 1000}
          - {unit_raw: "alqueire",       family: "area",     base_unit: "ha",  to_base: 2.42}
          # saca: family known, factor deferred to the product crosswalk.
          - {unit_raw: "saca",           family: "massa",    base_unit: "t",   to_base: }
      - input: ref('product_unit_factors')
        rows:
          - {source: "pevs", product_code: "9999", unit_raw: "saca", family: "massa", base_unit: "t", to_base: 0.06}
    expect:
      rows:
        - {product_code: "0001", unit_native: "Toneladas",     family: "massa",    qty_base: 120}
        - {product_code: "0002", unit_native: "Metros cúbicos", family: "volume",   qty_base: 50}
        - {product_code: "0003", unit_native: "kWh",           family: "energia",  qty_base: 5}
        - {product_code: "0004", unit_native: "milheiro",      family: "contagem", qty_base: 2000}
        - {product_code: "0005", unit_native: "alqueire",      family: "area",     qty_base: 121}
        - {product_code: "9999", unit_native: "saca",          family: "massa",    qty_base: 0.6}
