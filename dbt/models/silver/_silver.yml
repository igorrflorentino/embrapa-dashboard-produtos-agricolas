version: 2

models:
  - name: silver_ibge_pevs
    description: "PEVS extractive production cleaned, typed, deduplicated, with per-unit flags."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - city_code
              - product_code
              - variable_code
              - unit_of_measure
    columns:
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1986 and extract(year from current_date()) + 1"
      - name: state_acronym
        tests: [not_null]
      - name: product_code
        description: "Classification-193 code (e.g. 3405), taken directly from SIDRA's tipo_de_produto_extrativo_codigo."
        tests: [not_null]
      - name: variable_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["144", "145"]
      - name: numeric_value
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or numeric_value >= 0"

  - name: silver_ibge_pam
    description: "PAM crop production (SIDRA 5457) cleaned, typed, deduplicated. LONG: one row per (year, city, product, variable)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - city_code
              - product_code
              - variable_code
              - unit_of_measure
    columns:
      - name: reference_year
        tests:
          - not_null
          # PAM history runs to 1974. The monetary value now uses the date-aware
          # historical_currency_factors join (reform-correct, like PEVS), so the
          # old 1994+ lean-window guard is lifted — the seed covers Mil Cruzeiros
          # (from 1942) onward. Floor mirrors silver_ibge_pevs' 1986 lower bound's
          # intent: just catch a junk/blank year, not constrain real coverage.
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1974 and extract(year from current_date()) + 1"
      - name: state_acronym
        tests: [not_null]
      - name: product_code
        description: "SIDRA classification-782 crop code (e.g. 40124 = Soja)."
        tests: [not_null]
      - name: variable_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["8331", "216", "214", "112", "215"]
      - name: numeric_value
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or numeric_value >= 0"

  - name: silver_ibge_ppm
    description: "PPM livestock (SIDRA 3939 herd + 74 animal production) cleaned, typed, deduplicated, UNIONed. LONG: one row per (year, city, product, variable); measure_kind = stock|flow."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - city_code
              - product_code
              - variable_code
              - unit_of_measure
    columns:
      - name: measure_kind
        description: "'stock' (efetivo dos rebanhos — herd headcount) or 'flow' (produção de origem animal)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["stock", "flow"]
      - name: reference_year
        tests:
          - not_null
          # PPM history runs to 1974 (both tables 3939 + 74). Same reform-correct
          # currency machinery as PAM, so no 1994+ guard — just catch a junk year.
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1974 and extract(year from current_date()) + 1"
      - name: state_acronym
        tests: [not_null]
      - name: product_code
        description: "SIDRA herd code (c79: 2670=Bovino…) or animal-product code (c80: 2682=Leite…)."
        tests: [not_null]
      - name: variable_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["105", "106", "215"]  # herd qty · animal qty · animal value
      - name: numeric_value
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or numeric_value >= 0"

  - name: silver_bcb_inflation
    description: |
      Monthly inflation series with chain-linked 100-base index_value, so any
      historical Brazilian-currency amount can be deflated correctly.
    tests:
      # The chain-linked index assumes EXACTLY one row per (series, month): a
      # duplicate would double-count a month's factor and silently corrupt every
      # downstream val_real_* deflation. The model dedups via a qualify; this
      # asserts the grain actually holds post-build.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - series_code
              - reference_date
    columns:
      - name: reference_date
        tests: [not_null]
      - name: series_code
        tests: [not_null]
      - name: monthly_pct_change
        description: "Variation % as published by BCB SGS (e.g. series 433, 189, 190)."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                # Brazilian monthly inflation has never exceeded ±100% in any month;
                # a wider range than necessary catches parse errors without
                # rejecting legitimate hyperinflation-era spikes.
                expression: "is null or monthly_pct_change between -100 and 100"

  - name: silver_bcb_currency
    description: "Daily FX rates: BRL per foreign currency unit (BCB SGS: USD, EUR)."
    tests:
      # One row per (series, day): a duplicate PTAX row would skew the per-year
      # (PEVS) / per-month (COMEX) FX average the Gold val_yearfx_* columns use.
      # The model dedups via a qualify; this asserts the grain holds post-build.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - series_code
              - reference_date
    columns:
      - name: reference_date
        tests: [not_null]
      - name: currency
        # Guards the series_code filter: only configured BCB FX currencies may
        # surface here. A stale Bronze series leaking in would fail this.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [USD, EUR]
      - name: brl_per_foreign_unit
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or brl_per_foreign_unit > 0"

  - name: silver_comex_flows
    description: |
      MDIC Comex Stat flows cleaned, typed, deduplicated at the full source
      grain (flow × month × NCM × country × UF × transport route × customs
      office × statistical unit). VL_FOB/VL_FRETE/VL_SEGURO are nominal US$.
    tests:
      # Uniqueness is on ncm_code_REPORTED (the NCM as the source filed it), not the
      # normalized ncm_code: a retired NCM can map to the same current code as its
      # successor, which would legitimately repeat ncm_code. Gold/serving re-aggregate
      # by the normalized ncm_code.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - flow
              - reference_year
              - reference_month
              - ncm_code_reported
              - country_code
              - state_acronym
              - transport_route_code
              - customs_office_code
              - stat_unit_code
    columns:
      - name: ncm_code
        description: "8-digit NCM, NORMALIZED to the current code (retired→current via comex_ncm_succession)."
      - name: ncm_code_reported
        description: "8-digit NCM exactly as the MDIC bulk filed it for that year; audit trail."
        tests: [not_null]
      - name: flow
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["export", "import"]
      - name: reference_date
        tests: [not_null]
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1997 and extract(year from current_date()) + 1"
      - name: reference_month
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1 and 12"
      - name: ncm_code
        tests: [not_null]
      - name: val_fob_usd
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or val_fob_usd >= 0"

  - name: silver_comtrade_flows
    description: |
      UN Comtrade annual bilateral flows cleaned, typed, reduced to the canonical
      bilateral grain: one row per (flow, customs_code, year, reporter, partner, cmd).
      TOTALS-ONLY (2026-07, v1.13.0): keeps ONLY the fully-aggregated record on every
      dimension — customs_code = C00 ("todos os regimes / total"), flow in {export, import}
      (the two direction totals; the RX/RM/… sub-flows are subsets and are dropped), and the
      transport/second-partner/mode-of-supply aggregates (motCode=0, partner2Code=0,
      mosCode=0). This makes the base homogeneous across reporters and structurally free of
      the customs/flow/mode double-counts. reference_year is floored at var('comtrade_min_year',
      2000). primary/cif/fob values are nominal US$. Products are HS6. The World partner (0) is
      dropped. (customs_code is now a constant C00 — the per-regime detail the frozen "tipo de
      mercado" feature needed is no longer in the base.) Zero-quantity sentinels → NULL.
    tests:
      # Uniqueness is on cmd_code_REPORTED (the genuine natural key of a Comtrade
      # record), not the normalized cmd_code: two retired/current codes can map to
      # the same current code (e.g. 080300→080390), which would legitimately repeat
      # cmd_code. customs_code is part of the grain (the preserved regime dimension).
      # Gold/serving re-aggregate by the normalized cmd_code.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - flow
              - reference_year
              - reporter_code
              - partner_code
              - cmd_code_reported
              - customs_code
    columns:
      - name: cmd_code
        description: "HS6, NORMALIZED to the current code (retired→current via comtrade_hs_succession)."
      - name: cmd_code_reported
        description: "HS6 exactly as reported by the source (the revision in force that year); audit trail."
        tests: [not_null]
      - name: flow
        tests:
          - not_null
          - accepted_values:
              arguments:
                # TOTALS-ONLY: only the two direction totals are kept (export/import).
                values: ["export", "import"]
      - name: customs_code
        description: "UN Comtrade customs procedure (regime aduaneiro). TOTALS-ONLY: always C00 (todos os regimes / total) — the base ingests only customsCode=C00, so the per-regime detail (C01/C03/C20/…) is not present."
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1960 and extract(year from current_date()) + 1"
      - name: reporter_code
        tests: [not_null]
      - name: partner_code
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "!= '0'"     # World aggregate dropped in Silver
      - name: cmd_code
        tests: [not_null]
      - name: family
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area", "desconhecida"]
      - name: primary_value_usd
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or primary_value_usd >= 0"
      - name: qty_base
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or qty_base >= 0"

  - name: silver_currency
    description: |
      Unified FX source for the Gold deflation: BCB SGS (USD, EUR). One row
      schema for every currency, so the Gold fx CTEs are currency-agnostic.
    columns:
      - name: currency
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["USD", "EUR"]
      - name: brl_per_foreign_unit
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or brl_per_foreign_unit > 0"

unit_tests:
  # One quantity case per physical-unit family, plus a product-crosswalk
  # override case (saca: generic seed declares family=massa with NO factor; the
  # product_unit_factors row supplies to_base). Energia/contagem/area are not
  # present in real PEVS data, so the coverage is synthetic by design.
  - name: test_pevs_quantity_family_conversion
    model: silver_ibge_pevs
    # silver_ibge_pevs is incremental — test the full-refresh (else) branch.
    overrides:
      macros:
        is_incremental: false
    given:
      - input: source('bronze_ibge', 'sidra_raw')
        rows:
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0001", tipo_de_produto_extrativo: "1 - Massa", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "Toneladas",     valor: "120",  nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0002", tipo_de_produto_extrativo: "2 - Volume", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "Metros cúbicos", valor: "50",   nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0003", tipo_de_produto_extrativo: "3 - Energia", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "kWh",          valor: "5000", nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0004", tipo_de_produto_extrativo: "4 - Contagem", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "milheiro",     valor: "2",    nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "0005", tipo_de_produto_extrativo: "5 - Area", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "alqueire",     valor: "50",   nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_extrativo_codigo: "9999", tipo_de_produto_extrativo: "9 - Saca", variavel_codigo: "144", variavel: "Quantidade", unidade_de_medida: "saca",          valor: "10",   nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
      - input: ref('historical_currency_factors')
        # One non-matching row just so the empty-join CTE has a known schema.
        rows:
          - {unit_of_measure: "Mil Reais", year_from: 1900, year_to: 1901, brl_factor: 1.0}
      - input: ref('unit_family_conversions')
        rows:
          - {unit_raw: "toneladas",      family: "massa",    base_unit: "t",   to_base: 1}
          - {unit_raw: "metros cúbicos", family: "volume",   base_unit: "m³",  to_base: 1}
          - {unit_raw: "kwh",            family: "energia",  base_unit: "MWh", to_base: 0.001}
          - {unit_raw: "milheiro",       family: "contagem", base_unit: "un",  to_base: 1000}
          - {unit_raw: "alqueire",       family: "area",     base_unit: "ha",  to_base: 2.42}
          # saca: family known, factor deferred to the product crosswalk.
          - {unit_raw: "saca",           family: "massa",    base_unit: "t",   to_base: }
      - input: ref('product_unit_factors')
        rows:
          - {source: "pevs", product_code: "9999", unit_raw: "saca", family: "massa", base_unit: "t", to_base: 0.06}
    expect:
      rows:
        - {product_code: "0001", unit_native: "Toneladas",     family: "massa",    qty_base: 120}
        - {product_code: "0002", unit_native: "Metros cúbicos", family: "volume",   qty_base: 50}
        - {product_code: "0003", unit_native: "kWh",           family: "energia",  qty_base: 5}
        - {product_code: "0004", unit_native: "milheiro",      family: "contagem", qty_base: 2000}
        - {product_code: "0005", unit_native: "alqueire",      family: "area",     qty_base: 121}
        - {product_code: "9999", unit_native: "saca",          family: "massa",    qty_base: 0.6}

  # PPM is the multi-table, multi-unit-family source: this pins the headline risks
  # deterministically — the herd STOCK (Cabeças/contagem) vs animal FLOW union, the
  # per-product family split (volume/contagem/massa in ONE model), the "Mil" ×1000
  # scale folded into the seed to_base (Mil litros→m³ ×1, Mil dúzias→un ×12000), and
  # the reform-correct value factor on variable 215.
  - name: test_ppm_family_mil_scale_and_value_conversion
    model: silver_ibge_ppm
    overrides:
      macros:
        is_incremental: false
    given:
      - input: source('bronze_ppm', 'herd_raw')
        rows:
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_rebanho_codigo: "2670", tipo_de_rebanho: "Bovino", variavel_codigo: "105", variavel: "Efetivo dos rebanhos", unidade_de_medida: "Cabeças", valor: "120", nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
      - input: source('bronze_ppm', 'animal_raw')
        rows:
          # Leite — Mil litros: 5 mil litros → 5 m³ (to_base 1).
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_de_origem_animal_codigo: "2682", tipo_de_produto_de_origem_animal: "Leite", variavel_codigo: "106", variavel: "Produção de origem animal", unidade_de_medida: "Mil litros", valor: "5", nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          # Ovos de galinha — Mil dúzias: 3 mil dúzias → 36000 un (to_base 12000).
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_de_origem_animal_codigo: "2685", tipo_de_produto_de_origem_animal: "Ovos de galinha", variavel_codigo: "106", variavel: "Produção de origem animal", unidade_de_medida: "Mil dúzias", valor: "3", nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          # Mel — Quilogramas: 2000 kg → 2 t (to_base 0.001).
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_de_origem_animal_codigo: "2687", tipo_de_produto_de_origem_animal: "Mel de abelha", variavel_codigo: "106", variavel: "Produção de origem animal", unidade_de_medida: "Quilogramas", valor: "2000", nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
          # Value (215) Mil Reais: factor 1000 folds the "Mil" → nominal R$ 100000.
          - {ano: "2020", municipio_codigo: "3500001", municipio: "Foo - SP", tipo_de_produto_de_origem_animal_codigo: "2682", tipo_de_produto_de_origem_animal: "Leite", variavel_codigo: "215", variavel: "Valor da produção", unidade_de_medida: "Mil Reais", valor: "100", nivel_territorial: "Município", ingestion_timestamp: "2024-01-01 00:00:00"}
      - input: ref('historical_currency_factors')
        rows:
          - {unit_of_measure: "Mil Reais", year_from: 1994, year_to: 2030, brl_factor: 1000.0}
      - input: ref('unit_family_conversions')
        rows:
          - {unit_raw: "cabeças",     family: "contagem", base_unit: "un", to_base: 1}
          - {unit_raw: "mil litros",  family: "volume",   base_unit: "m³", to_base: 1}
          - {unit_raw: "mil dúzias",  family: "contagem", base_unit: "un", to_base: 12000}
          - {unit_raw: "quilogramas", family: "massa",    base_unit: "t",  to_base: 0.001}
      - input: ref('product_unit_factors')
        # silver_ibge_ppm LEFT JOINs this (DBT-4 uniformity with PEVS/PAM), so the unit_test
        # MUST mock it or `dbt build` fails to compile ("depends on a node ... not found") — the
        # gap that broke the scheduled/push prod build. No PPM product override is exercised here
        # (the seed ships only source='_reference' sentinels), so a non-matching row keeps the
        # join inert and qty_base falls back to unit_family_conversions, matching `expect`.
        rows:
          - {source: "_reference", product_code: "0000", unit_raw: "x", family: "massa", base_unit: "t", to_base: 1}
    expect:
      rows:
        - {product_code: "2670", variable_code: "105", measure_kind: "stock", family: "contagem", qty_base: 120,   is_monetary_value: false, numeric_value: 120}
        - {product_code: "2682", variable_code: "106", measure_kind: "flow",  family: "volume",   qty_base: 5,     is_monetary_value: false, numeric_value: 5}
        - {product_code: "2685", variable_code: "106", measure_kind: "flow",  family: "contagem", qty_base: 36000, is_monetary_value: false, numeric_value: 3}
        - {product_code: "2687", variable_code: "106", measure_kind: "flow",  family: "massa",    qty_base: 2,     is_monetary_value: false, numeric_value: 2000}
        - {product_code: "2682", variable_code: "215", measure_kind: "flow",  family: null,       qty_base: null,  is_monetary_value: true,  numeric_value: 100000}
