version: 2

sources:
  - name: bronze_ibge
    description: "Raw SIDRA payloads ingested by `embrapa ingest ibge`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_IBGE_DATASET', 'bronze_ibge') }}"
    tables:
      - name: sidra_raw
        identifier: "{{ env_var('BQ_BRONZE_IBGE_TABLE', 'sidra_t289_raw') }}"
        description: "IBGE PEVS table (raw STRING columns)."
        config:
          loaded_at_field: ingestion_timestamp
          # Nightly delta ingest (in_all=True): each successful run appends rows
          # with a fresh ingestion_timestamp, so max(ts) tracks the pipeline, not
          # the (annual) data period. Warn at 2 days, error after a week of misses.
          freshness:
            warn_after: {count: 2, period: day}
            error_after: {count: 7, period: day}

  - name: bronze_pam
    description: "Raw SIDRA PAM (table 5457) payloads ingested by `embrapa ingest ibge-pam`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_PAM_DATASET', 'bronze_pam') }}"
    tables:
      - name: sidra_raw
        identifier: "{{ env_var('BQ_BRONZE_PAM_TABLE', 'sidra_t5457_raw') }}"
        description: "IBGE PAM crop production table (raw STRING columns)."
        config:
          loaded_at_field: ingestion_timestamp
          # PAM is refreshed MANUALLY (in_all=False — excluded from the nightly
          # batch; annual, slow-changing data). Warn-only after a long gap so it
          # never false-alarms the nightly check; no error threshold (manual cadence).
          freshness:
            warn_after: {count: 60, period: day}

  - name: bronze_ppm
    description: "Raw SIDRA PPM (Pesquisa da Pecuária Municipal) payloads ingested by `embrapa ingest ibge-ppm`. Two tables (herd headcount + animal production) unioned in silver_ibge_ppm."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_PPM_DATASET', 'bronze_ppm') }}"
    tables:
      - name: herd_raw
        identifier: "{{ env_var('BQ_BRONZE_PPM_HERD_TABLE', 'sidra_t3939_raw') }}"
        description: "IBGE PPM efetivo dos rebanhos (table 3939 — herd headcount, raw STRING columns)."
        config:
          loaded_at_field: ingestion_timestamp
          # Manual cadence like PAM (in_all=False); warn-only, no error threshold.
          freshness:
            warn_after: {count: 60, period: day}
      - name: animal_raw
        identifier: "{{ env_var('BQ_BRONZE_PPM_ANIMAL_TABLE', 'sidra_t74_raw') }}"
        description: "IBGE PPM produção de origem animal (table 74 — milk/eggs/honey/wool, raw STRING columns)."
        config:
          loaded_at_field: ingestion_timestamp
          freshness:
            warn_after: {count: 60, period: day}

  - name: bronze_bcb
    description: "Raw BCB SGS series ingested by `embrapa ingest bcb-*`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_BCB_DATASET', 'bronze_bcb') }}"
    tables:
      - name: inflation_raw
        identifier: "{{ env_var('BQ_BRONZE_BCB_INFLATION_TABLE', 'inflation_series_raw') }}"
        description: "Monthly inflation indices (variation %)."
        config:
          loaded_at_field: ingestion_timestamp
          # Nightly delta ingest (in_all=True) — see sidra_raw rationale.
          freshness:
            warn_after: {count: 2, period: day}
            error_after: {count: 7, period: day}
      - name: currency_raw
        identifier: "{{ env_var('BQ_BRONZE_BCB_CURRENCY_TABLE', 'currency_series_raw') }}"
        description: "Daily FX rates BRL per foreign unit."
        config:
          loaded_at_field: ingestion_timestamp
          # Nightly delta ingest (in_all=True) — see sidra_raw rationale.
          freshness:
            warn_after: {count: 2, period: day}
            error_after: {count: 7, period: day}

  - name: bronze_comex
    description: "Raw MDIC Comex Stat foreign-trade flows ingested by `embrapa ingest comex`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_COMEX_DATASET', 'bronze_comex') }}"
    tables:
      - name: comex_flows_raw
        identifier: "{{ env_var('BQ_BRONZE_COMEX_FLOWS_TABLE', 'comex_flows_raw') }}"
        description: "Export + import flows at source grain (raw STRING columns). flow + CO_* columns."
        config:
          loaded_at_field: ingestion_timestamp
          # COMEX re-downloads only on an MDIC ETag change (~monthly), so — unlike
          # IBGE/BCB, which re-fetch a window and append EVERY nightly run — it does
          # NOT append every night: its ingestion_timestamp tracks DATA updates, not
          # pipeline health (which the Cloud Run Job failure alert covers). The
          # window is therefore the publish cadence: warn when a monthly update is
          # overdue, error after ~two missed. A 2d/7d window here false-alarms on
          # every normal gap between MDIC releases.
          freshness:
            warn_after: {count: 30, period: day}
            error_after: {count: 60, period: day}

  - name: bronze_comtrade
    description: "Raw UN Comtrade global bilateral trade flows ingested by `embrapa ingest comtrade`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_COMTRADE_DATASET', 'bronze_comtrade') }}"
    tables:
      - name: comtrade_flows_raw
        identifier: "{{ env_var('BQ_BRONZE_COMTRADE_FLOWS_TABLE', 'comtrade_flows_raw') }}"
        description: "Annual reporter→partner flows at source grain (raw STRING columns). One row per (refYear, reporter, partner, partner2, cmd, flow, customs, mos, mot, qtyUnit)."
        config:
          loaded_at_field: ingestion_timestamp
          # Key-gated, refreshed MANUALLY (in_all=False — excluded from the nightly
          # batch). Warn-only after a long gap so it never false-alarms the
          # nightly check; no error threshold (manual cadence is expected).
          freshness:
            warn_after: {count: 60, period: day}

  - name: research_inputs
    description: >
      Researcher curation inputs — append-only logs written by the dashboard's
      curation panel (the Python data-access layer), NOT by the ingestion
      pipeline or dbt. The dashboard's "Aplicar" appends an immutable row per
      manual edit; dim_code_industrialization_scd2 derives the Type-2 history
      from it. The table is auto-created by
      `serving.attribute_engineering.ensure_code_industrialization_log_table()` (house
      auto-create pattern), so it may be absent on a fresh project —
      dim_code_industrialization_scd2 is gated behind
      `--vars 'enable_curation: true'`.
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_RESEARCH_INPUTS_DATASET', 'research_inputs') }}"
    tables:
      - name: code_industrialization_log
        identifier: "{{ env_var('BQ_CODE_INDUSTRIALIZATION_LOG_TABLE', 'code_industrialization_log') }}"
        description: >
          Append-only SCD2 source at the per-CODE grain: one row per manual
          per-CODE edit. Columns: source (banco id), code
          (NCM/PEVS/HS6), industrialization_level (bruta|processada|misturado),
          note, edited_by (IAP email), edited_at (TIMESTAMP), change_id.
          dim_code_industrialization_scd2 derives the Type-2 history; the
          value-added analysis splits COMEX exports by the current level.
        config:
          loaded_at_field: edited_at
      - name: commodity_catalog_log
        identifier: "{{ env_var('BQ_COMMODITY_CATALOG_LOG_TABLE', 'commodity_catalog_log') }}"
        description: >
          Append-only Curadoria (catalog) source: one row per manual commodity-catalog
          edit. Columns: codigo_commodity, banco (source token pevs/comex/comtrade/
          pam/ppm), agrupamento (cross-source concept), descricao_commodity,
          industrializacao, ciclo_de_vida, code_prefix, commodity_id, active
          (false = a tombstone: the entry left the catalog → its Gold data is an
          orphan), edited_by (IAP email), edited_at (TIMESTAMP), change_id.
          dim_commodity_catalog derives the current (latest-wins, active) catalog and
          gold_commodity_crosswalk reads it — the editable successor to the
          commodity_crosswalk seed (backfilled from the seed on cutover). Unlike the
          frozen code_industrialization_log it is NOT gated — it is the live catalog
          source, so it must exist for the build (created on first write / backfill).
        config:
          loaded_at_field: edited_at
