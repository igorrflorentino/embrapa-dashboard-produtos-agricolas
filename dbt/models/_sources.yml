version: 2

sources:
  - name: bronze_ibge
    description: "Raw SIDRA payloads ingested by `embrapa ingest ibge`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_IBGE_DATASET', 'bronze_ibge') }}"
    tables:
      - name: sidra_raw
        identifier: "{{ env_var('BQ_BRONZE_IBGE_TABLE', 'sidra_t289_raw') }}"
        description: "IBGE PEVS table (raw STRING columns)."
        config:
          loaded_at_field: ingestion_timestamp

  - name: bronze_bcb
    description: "Raw BCB SGS series ingested by `embrapa ingest bcb-*`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_BCB_DATASET', 'bronze_bcb') }}"
    tables:
      - name: inflation_raw
        identifier: "{{ env_var('BQ_BRONZE_BCB_INFLATION_TABLE', 'inflation_series_raw') }}"
        description: "Monthly inflation indices (variation %)."
        config:
          loaded_at_field: ingestion_timestamp
      - name: currency_raw
        identifier: "{{ env_var('BQ_BRONZE_BCB_CURRENCY_TABLE', 'currency_series_raw') }}"
        description: "Daily FX rates BRL per foreign unit."
        config:
          loaded_at_field: ingestion_timestamp

  - name: bronze_comex
    description: "Raw MDIC Comex Stat foreign-trade flows ingested by `embrapa ingest comex`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_COMEX_DATASET', 'bronze_comex') }}"
    tables:
      - name: comex_flows_raw
        identifier: "{{ env_var('BQ_BRONZE_COMEX_FLOWS_TABLE', 'comex_flows_raw') }}"
        description: "Export + import flows at source grain (raw STRING columns). flow + CO_* columns."
        config:
          loaded_at_field: ingestion_timestamp
