version: 2

sources:
  - name: bronze_ibge
    description: "Raw SIDRA payloads ingested by `embrapa ingest ibge`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_IBGE_DATASET', 'bronze_ibge') }}"
    tables:
      - name: sidra_raw
        identifier: "{{ env_var('BQ_BRONZE_IBGE_TABLE', 'sidra_t289_raw') }}"
        description: "IBGE PEVS table (raw STRING columns)."
        config:
          loaded_at_field: ingestion_timestamp

  - name: bronze_bcb
    description: "Raw BCB SGS series ingested by `embrapa ingest bcb-*`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_BCB_DATASET', 'bronze_bcb') }}"
    tables:
      - name: inflation_raw
        identifier: "{{ env_var('BQ_BRONZE_BCB_INFLATION_TABLE', 'inflation_series_raw') }}"
        description: "Monthly inflation indices (variation %)."
        config:
          loaded_at_field: ingestion_timestamp
      - name: currency_raw
        identifier: "{{ env_var('BQ_BRONZE_BCB_CURRENCY_TABLE', 'currency_series_raw') }}"
        description: "Daily FX rates BRL per foreign unit."
        config:
          loaded_at_field: ingestion_timestamp

  - name: bronze_comex
    description: "Raw MDIC Comex Stat foreign-trade flows ingested by `embrapa ingest comex`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_COMEX_DATASET', 'bronze_comex') }}"
    tables:
      - name: comex_flows_raw
        identifier: "{{ env_var('BQ_BRONZE_COMEX_FLOWS_TABLE', 'comex_flows_raw') }}"
        description: "Export + import flows at source grain (raw STRING columns). flow + CO_* columns."
        config:
          loaded_at_field: ingestion_timestamp

  - name: bronze_comtrade
    description: "Raw UN Comtrade global bilateral trade flows ingested by `embrapa ingest comtrade`."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_BRONZE_COMTRADE_DATASET', 'bronze_comtrade') }}"
    tables:
      - name: comtrade_flows_raw
        identifier: "{{ env_var('BQ_BRONZE_COMTRADE_FLOWS_TABLE', 'comtrade_flows_raw') }}"
        description: "Annual reporter→partner flows at source grain (raw STRING columns). One row per (refYear, reporter, partner, partner2, cmd, flow, customs, mos, mot, qtyUnit)."
        config:
          loaded_at_field: ingestion_timestamp

  - name: research_inputs
    description: >
      Researcher curation inputs — append-only logs written by the dashboard's
      curation panel (the Python data-access layer), NOT by the ingestion
      pipeline or dbt. The dashboard's "Salvar" appends an immutable row per
      manual edit; dim_commodity_scd2 derives the Type-2 history from it. The
      table is auto-created by `serving.curation.ensure_curation_log_table()`
      (house auto-create pattern), so it may be absent on a fresh project —
      dim_commodity_scd2 is gated behind `--vars 'enable_curation: true'`.
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_RESEARCH_INPUTS_DATASET', 'research_inputs') }}"
    tables:
      - name: commodity_processing_stage_log
        identifier: "{{ env_var('BQ_CURATION_LOG_TABLE', 'commodity_processing_stage_log') }}"
        description: >
          Append-only SCD2 source. One row per manual classification edit:
          commodity_id, processing_stage, note, edited_by (IAP email),
          edited_at (TIMESTAMP), change_id (surrogate).
        config:
          loaded_at_field: edited_at
