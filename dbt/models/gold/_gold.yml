version: 2

models:
  - name: gold_pevs_production
    description: |
      Gold table for IBGE PEVS — the single, comprehensive `production` table
      for this source (naming convention: gold_<source>_<form>; `production` =
      one row per produced/extracted measurement, no origin→destination).
      Wide, partitioned, clustered fact table. One row per
      (reference_year, state_acronym, city_code, product_code) — city_code is the
      natural geographic key (city_name is a display label lifted via any_value).
      Ad-hoc state/year/national aggregation is derived at query time via GROUP BY.
      For the dashboard's Pushdown Computing (React SPA + Flask webapi BFF), the
      `serving/` layer materializes pre-aggregated marts at the chart grains —
      they derive from this Gold table, not replace it.
      Physical table (not a view) so BI Engine can cache it.

      Value columns: val_yearfx_{brl,usd,eur} (nominal at year-of-record FX),
      val_real_ipca_{brl,usd,eur} / val_real_igpm_{brl,usd,eur} /
      val_real_igpdi_{brl,usd,eur} (deflated to today via the respective
      BCB chain index, optionally converted to foreign currency at today's FX).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - state_acronym
              - city_code
              - product_code
    columns:
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1986 and extract(year from current_date()) + 1"
      - name: reference_date
        description: "December 31 of reference_year. Use as DATE dimension in Looker Studio."
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: state_name
        description: "Full state name (e.g. 'Bahia') derived from state_acronym."
        tests: [not_null]
      - name: region
        description: "One of: Norte, Nordeste, Centro-Oeste, Sudeste, Sul."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: city_code
        description: "IBGE 7-digit municipal code. Required for Looker Studio municipality geo charts."
        tests: [not_null]
      - name: city_name
        tests: [not_null]
      - name: product_code
        tests: [not_null]
      - name: family
        description: "Physical-unit family of the quantity: massa|volume|energia|contagem|area|desconhecida. NEVER sum qty_base across families."
        tests:
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area", "desconhecida"]
      - name: unit_native
        description: "Source unit label kept verbatim for display (Toneladas, Metros cúbicos, …)."
      - name: qty_native
        description: "Quantity in unit_native (the source reading)."
      - name: qty_base
        description: "qty_native converted to the family base_unit (t/m³/MWh/un/ha). NULL when the unit has no conversion (desconhecida or deferred commodity factor)."
      - name: base_unit
        description: "Base unit of the family (t, m³, MWh, un, ha)."
      - name: last_refresh
        description: "Max ingestion_timestamp across the rows aggregated into this record."
        tests: [not_null]
      - name: data_quality_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["OK", "MISSING_VALUE", "MISSING_QUANTITY", "INCOMPLETE", "OUTLIER_QUANTITY", "PROBLEMATIC_QUANTITY", "OUTLIER_VALUE", "PROBLEMATIC_VALUE", "INFERRED_QUANTITY", "INFERRED_VALUE"]

  - name: gold_pam_production
    description: |
      Gold table for IBGE PAM (Produção Agrícola Municipal, SIDRA 5457) — the
      comprehensive `production` fact for crop agriculture. One row per
      (reference_year, state_acronym, city_code, product_code), pivoting PAM's
      five measures into columns: area_planted_ha / area_harvested_ha (ha),
      qty_native (t, the 'massa' quantity) / qty_base, yield_kg_ha (kg/ha), and
      the monetary val_* matrix (same FX + inflation deflation as
      gold_pevs_production). Full history (1974+): val_raw is nominal R$ via the
      date-aware historical_currency_factors join in silver_ibge_pam (reform-correct
      for pre-1994 Cruzeiros/Cruzados/…). serving_pam_annual derives the chart-grain
      mart from this table.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - state_acronym
              - city_code
              - product_code
    columns:
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1974 and extract(year from current_date()) + 1"
      - name: reference_date
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: state_name
        description: "Full state name derived from state_acronym."
        tests: [not_null]
      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: city_code
        description: "IBGE 7-digit municipal code."
        tests: [not_null]
      - name: product_code
        description: "SIDRA classification-782 crop code (e.g. 40124 = Soja)."
        tests: [not_null]
      - name: family
        description: "Physical-unit family of the quantity (always 'massa'/t for the lean crops)."
        tests:
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area", "desconhecida"]
      - name: area_planted_ha
        description: "Área plantada ou destinada à colheita (hectares). NULL when the source omitted it."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or area_planted_ha >= 0"
      - name: area_harvested_ha
        description: "Área colhida (hectares)."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or area_harvested_ha >= 0"
      - name: yield_kg_ha
        description: "Rendimento médio da produção (kg/ha), as reported by SIDRA (not summable — recompute as qty/area at coarser grains)."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or yield_kg_ha >= 0"
      - name: last_refresh
        tests: [not_null]
      - name: data_quality_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["OK", "MISSING_VALUE", "MISSING_QUANTITY", "INCOMPLETE", "OUTLIER_QUANTITY", "PROBLEMATIC_QUANTITY", "OUTLIER_VALUE", "PROBLEMATIC_VALUE", "INFERRED_QUANTITY", "INFERRED_VALUE"]

  - name: gold_ppm_production
    description: |
      Gold table for IBGE PPM (Pesquisa da Pecuária Municipal) — the comprehensive
      `production` fact for livestock. One row per (reference_year, state_acronym,
      city_code, product_code), with qty_native in the product's own family (Cabeças/
      contagem for herd, Mil litros/volume + Quilogramas/massa + Mil dúzias/contagem
      for animal production) and the monetary val_* matrix (same FX + inflation
      deflation as gold_pevs/pam — animal production only). DIVERGES from PAM: no
      área/rendimento (livestock has no planted area → no 'yield'); carries a
      `measure_kind` ('stock' herd headcount vs 'flow' animal production). Full
      history (1974+), reform-correct via silver_ibge_ppm. serving_ppm_annual derives
      the chart-grain mart from this table.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - state_acronym
              - city_code
              - product_code
    columns:
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1974 and extract(year from current_date()) + 1"
      - name: reference_date
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: state_name
        description: "Full state name derived from state_acronym."
        tests: [not_null]
      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: city_code
        description: "IBGE 7-digit municipal code."
        tests: [not_null]
      - name: product_code
        description: "SIDRA herd code (c79, e.g. 2670=Bovino) or animal-product code (c80, e.g. 2682=Leite)."
        tests: [not_null]
      - name: measure_kind
        description: "'stock' (herd headcount, no value) vs 'flow' (animal production, qty + value)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["stock", "flow"]
      - name: family
        description: "Physical-unit family of the quantity (contagem for herd/eggs, volume for milk, massa for honey/wool)."
        tests:
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area", "desconhecida"]
      - name: last_refresh
        tests: [not_null]
      - name: data_quality_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["OK", "MISSING_VALUE", "MISSING_QUANTITY", "INCOMPLETE", "OUTLIER_QUANTITY", "PROBLEMATIC_QUANTITY", "OUTLIER_VALUE", "PROBLEMATIC_VALUE", "INFERRED_QUANTITY", "INFERRED_VALUE"]

  - name: gold_comex_flows
    description: |
      Gold table for MDIC Comex Stat — the single comprehensive `flows` table
      for this source (naming: gold_<source>_<form>; `flows` = origin→destination
      trade). One row per (flow, reference_year, reference_month, ncm_code,
      country_code, state_acronym, transport_route_code) — transport route is
      part of the grain (it backs the frontend `via` filter); the Silver source
      grain (also split by customs office / statistical unit) is summed up here.
      Any coarser aggregation (including across routes) is derived at query time
      via GROUP BY.

      Value columns: val_yearfx_{usd,brl,eur} (nominal at month-of-record FX,
      from the source US$ FOB), val_real_ipca_{brl,usd,eur} /
      val_real_igpm_* / val_real_igpdi_* (US$ FOB → BRL at month FX → projected
      to today via the respective BCB chain index → reconverted at today's FX).
      Plus val_freight_usd / val_insurance_usd (import-only, nominal US$).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - flow
              - reference_year
              - reference_month
              - ncm_code
              - country_code
              - state_acronym
              - transport_route_code
    columns:
      - name: flow
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["export", "import"]
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1997 and extract(year from current_date()) + 1"
      - name: reference_month
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1 and 12"
      - name: reference_date
        description: "First day of (reference_year, reference_month). Use as DATE dimension in Looker Studio."
        tests: [not_null]
      - name: ncm_code
        description: "8-digit NCM code (castanha 0801* or HS chapter 44)."
        tests: [not_null]
      - name: ncm_description
        description: "Portuguese NCM description (seed comex_ncm). NULL if the NCM is outside the seeded scope."
      - name: hs_chapter
        description: "First 2 digits of ncm_code."
        tests: [not_null]
      - name: country_code
        description: "MDIC numeric country code (CO_PAIS)."
        tests: [not_null]
      - name: country_name
        description: "Portuguese country name (seed comex_country, joined on CO_PAIS)."
      - name: country_iso_a3
        description: "ISO alpha-3 country code (seed comex_country)."
      - name: state_acronym
        description: "UF of the NCM (SG_UF_NCM). May be a special non-UF code (EX, ND, ZN, …)."
        tests: [not_null]
      - name: transport_route_code
        description: "MDIC transport-mode code (CO_VIA), e.g. 01=Marítima, 04=Aérea, 07=Rodoviária. Part of the grain; backs the frontend `via` filter."
        tests: [not_null]
      - name: via_name
        description: "Portuguese transport-mode label (seed comex_via, joined on CO_VIA)."
      - name: family
        description: "Physical-unit family of qty_native: massa|volume|energia|contagem|area|desconhecida. NEVER sum qty_base across families. net_weight_kg is a separate always-massa measure."
        tests:
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area", "desconhecida"]
      - name: unit_native
        description: "Statistical-unit name (seed comex_unit), e.g. METRO CUBICO, QUILOGRAMA LIQUIDO. The source label for qty_native. Varies by NCM."
      - name: unit_native_symbol
        description: "Short symbol for unit_native (e.g. M3, KGL)."
      - name: qty_native
        description: "Statistical quantity in unit_native (summed to this grain). Do NOT sum across mixed units — use qty_base grouped by family."
      - name: qty_base
        description: "qty_native converted to the family base_unit (t/m³/MWh/un/ha). NULL when the unit has no conversion (desconhecida)."
      - name: base_unit
        description: "Base unit of the family (t, m³, MWh, un, ha)."
      - name: region
        description: "Brazilian region; NULL for special non-UF state codes."
        tests:
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: data_quality_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["OK", "MISSING_VALUE", "MISSING_WEIGHT", "INCOMPLETE", "OUTLIER_QUANTITY", "PROBLEMATIC_QUANTITY", "OUTLIER_VALUE", "PROBLEMATIC_VALUE", "INFERRED_QUANTITY", "INFERRED_VALUE"]
      - name: last_refresh
        description: "Max ingestion_timestamp across the source rows aggregated into this record."
        tests: [not_null]

  - name: gold_comtrade_flows
    description: |
      Gold table for UN Comtrade — the single comprehensive `flows` table for
      this source (naming: gold_<source>_<form>; `flows` = origin→destination
      trade). The global complement to gold_comex_flows. One row per (flow,
      customs_code, reference_year, reporter_code, partner_code, cmd_code); the Silver
      source grain (also split by partner2 / mode-of-supply / mode-of-transport /
      qty-unit) is summed up here. The CUSTOMS PROCEDURE (regime aduaneiro) is preserved
      as a dimension (C00 = todos os regimes / total; the only value for ~86% of trade).
      Coarser cuts derived at query time via GROUP BY. The World partner (0) is dropped
      in Silver, so SUM over partner_code is a true bilateral total. Products are HS6;
      flow ∈ the ten UN trade regimes (export/import/re-export/re-import + six processing
      regimes, the latter empty until re-ingested).

      Annual source value is nominal US$ (primaryValue): val_yearfx_{usd,brl,eur}
      (at the year-average FX), val_real_ipca_{brl,usd,eur} / val_real_igpm_* /
      val_real_igpdi_* (US$ → BRL at year FX → projected to today via the BCB chain
      index → reconverted at today's FX). Plus val_cif_usd / val_fob_usd.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - flow
              - customs_code
              - reference_year
              - reporter_code
              - partner_code
              - cmd_code
    columns:
      - name: flow
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["export", "import", "re-export", "re-import",
                         "national-export", "foreign-import",
                         "import-inward-processing", "import-outward-processing",
                         "export-inward-processing", "export-outward-processing"]
      - name: customs_code
        description: "UN Comtrade customs procedure (regime aduaneiro). C00 = todos os regimes / total; specific procedures otherwise. SUM over customs_code = the bilateral total (no double-count)."
        tests: [not_null]
      - name: market_nature
        description: "Tipo de mercado (consumo/processamento), seed-classified per (customs_code × flow) via comtrade_market_nature. NULL where the pair has no economic-purpose mapping."
        tests:
          - accepted_values:
              arguments:
                values: [consumo, processamento]
              config:
                severity: warn
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1960 and extract(year from current_date()) + 1"
      - name: reference_date
        description: "Dec 31 of reference_year. Use as DATE dimension in Looker Studio (annual grain)."
        tests: [not_null]
      - name: cmd_code
        description: "HS code in scope (0801 nuts or 44 wood/charcoal)."
        tests: [not_null]
      - name: cmd_description
        description: "Portuguese HS description (seed comtrade_hs). NULL if outside the seeded scope."
      - name: hs_chapter
        description: "First 2 digits of cmd_code."
        tests: [not_null]
      - name: reporter_code
        description: "Reporting country, M49 numeric (origin for exports, destination for imports)."
        tests: [not_null]
      - name: reporter_name
        description: "Reporter name (seed comtrade_country, joined on M49)."
      - name: reporter_iso_a3
        description: "Reporter ISO alpha-3 (seed comtrade_country)."
      - name: partner_code
        description: "Partner country, M49 numeric. Never '0' (World dropped in Silver)."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "!= '0'"
      - name: partner_name
        description: "Partner name (seed comtrade_country). May be an 'nes' aggregate area."
      - name: partner_iso_a3
        description: "Partner ISO alpha-3 (seed comtrade_country)."
      - name: partner_is_group
        description: "True when the partner is an aggregate area (e.g. 'Outros da Ásia, nep'), not a single country."
      - name: family
        description: "Physical-unit family of qty_native: massa|volume|energia|contagem|area|desconhecida. NEVER sum qty_base across families. net_weight_kg is a separate always-massa measure."
        tests:
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area", "desconhecida"]
      - name: qty_native
        description: "Reported quantity in unit_native (summed). NULL when quantity not collected (common in chapter 44)."
      - name: qty_base
        description: "qty_native converted to the family base_unit (t/m³/MWh/un/ha). NULL when the unit has no conversion (desconhecida)."
      - name: net_weight_kg
        description: "Net weight in kilograms (always-comparable massa). NULL when not reported."
      - name: data_quality_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["OK", "MISSING_VALUE", "MISSING_QUANTITY", "INCOMPLETE", "OUTLIER_QUANTITY", "PROBLEMATIC_QUANTITY", "OUTLIER_VALUE", "PROBLEMATIC_VALUE", "INFERRED_QUANTITY", "INFERRED_VALUE"]
      - name: last_refresh
        description: "Max ingestion_timestamp across the source rows aggregated into this record."
        tests: [not_null]

  - name: gold_commodity_crosswalk
    description: |
      Cross-source product bridge (resolved): exact (source, code) → commodity,
      expanded from the commodity_crosswalk seed's prefixes against the codes that
      actually appear in the Gold fact tables. A consumer joins each fact's product
      code on (source, code) to group the SAME commodity across PEVS / COMEX /
      COMTRADE. Codes matching no commodity are absent ("unlinked").
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - source
              - code
    columns:
      - name: commodity_id
        description: "Stable commodity slug (e.g. castanha_do_para, madeira, soja)."
        tests: [not_null]
      - name: commodity_name
        tests: [not_null]
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["pevs", "comex", "comtrade"]
      - name: code
        description: "Exact product code in that source (PEVS code / NCM8 / HS6)."
        tests: [not_null]

  - name: gold_source_metadata
    description: |
      Per-source provenance for the frontend metadata seam (dataStore.meta(id)):
      table, cadence, coverage (year_start/end), counters (total_rows,
      products_total, ufs_total) and freshness (last_refresh), all derived from
      the Gold fact tables. One row per source. implStatus / visible / preview are
      runtime config (not data) — see docs/frontend_data_contract.md.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [source]
    columns:
      - name: source
        description: "Bank id matching bancos.js (ibge_pevs / ibge_pam / ibge_ppm / mdic_comex / un_comtrade)."
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ["ibge_pevs", "ibge_pam", "ibge_ppm", "mdic_comex", "un_comtrade"]
      - name: gold_table
        description: "Gold table backing this source."
        tests: [not_null]
      - name: cadence
        description: "Reporting cadence: 'annual' or 'monthly' (COMEX)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["annual", "monthly"]
      - name: year_start
        description: "Earliest reference_year present. Coverage start (yearStart)."
        tests: [not_null]
      - name: year_end
        description: "Latest reference_year present. Coverage end / yearEnd / PEVS lastCrop."
        tests: [not_null]
      - name: total_rows
        description: "Row count of the Gold table (totalRows counter)."
        tests: [not_null]
      - name: products_total
        description: "Distinct product codes (productsTotal): PEVS product / NCM8 / HS6."
        tests: [not_null]
      - name: ufs_total
        description: "Distinct Brazilian UFs (ufsTotal). NULL for COMTRADE (country↔country, no UF)."
      - name: last_refresh
        description: "Max ingestion_timestamp across the source's Gold rows. Feeds refresh / goldVersion.at / isStale."
        tests: [not_null]

unit_tests:
  # ── Monetary deflation / FX numeric correctness — the dashboard's scientific
  # core (historical real-value comparison). Feeds a fixed (val_raw, IPCA index,
  # FX) fixture and asserts the EXACT real-value + year-FX outputs, pinning:
  #   (a) the IPCA chain ratio  current / year_end,
  #   (b) that year_end picks the December index (reference_month desc) and current
  #       the GLOBAL latest (reference_date desc),
  #   (c) the per-year FX average and the >= 1994 year-FX guard,
  #   (d) the today-FX conversion of the real column.
  # Worked numbers (record year 2000):
  #   val_raw = 1000 R$;  IPCA year_end(2000)=100, current=300 → ratio 3
  #     → val_real_ipca_brl = 1000 * 3            = 3000
  #   FX USD: avg(2000)=2.0, latest=5.0
  #     → val_yearfx_usd    = 1000 / 2.0          = 500   (year >= 1994)
  #     → val_real_ipca_usd = 3000 / 5.0          = 600
  - name: test_pevs_deflation_and_fx_arithmetic
    model: gold_pevs_production
    given:
      - input: ref('silver_ibge_pevs')
        rows:
          # Monetary variable row → val_raw via numeric_value (qty cols null).
          - {reference_year: 2000, state_acronym: "PA", city_code: "1500800", city_name: "Belém", product_code: "0001", product_description: "Açaí", is_monetary_value: true,  numeric_value: 1000, qty_native: , qty_base: , family: , unit_native: , base_unit: , ingestion_timestamp: "2024-01-01 00:00:00"}
          # Quantity variable row (same natural key) → lifts qty/family.
          - {reference_year: 2000, state_acronym: "PA", city_code: "1500800", city_name: "Belém", product_code: "0001", product_description: "Açaí", is_monetary_value: false, numeric_value: 5,    qty_native: 5, qty_base: 5, family: "massa", unit_native: "t", base_unit: "t", ingestion_timestamp: "2024-01-01 00:00:00"}
      - input: ref('silver_bcb_inflation')
        rows:
          # IPCA (series 433): Dec-2000 = the record year-end; 2024 = the global latest.
          - {reference_year: 2000, series_code: "433", index_value: 100, reference_month: 12, reference_date: "2000-12-01"}
          - {reference_year: 2024, series_code: "433", index_value: 300, reference_month: 12, reference_date: "2024-12-01"}
      - input: ref('silver_currency')
        rows:
