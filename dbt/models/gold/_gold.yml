version: 2

models:
  - name: gold_commodity_matrix
    description: |
      Wide, partitioned, clustered fact table feeding the Looker Studio dashboard.
      One row per (reference_year, state_acronym, city_name, product_code).
      Physical table (not a view) so BI Engine can cache it.

      Value columns: val_yearfx_{brl,usd,eur,cny} (nominal at year-of-record FX),
      val_real_ipca_{brl,usd,eur,cny} / val_real_igpm_{brl,usd,eur,cny} /
      val_real_igpdi_{brl,usd,eur,cny} (deflated to today via the respective
      BCB chain index, optionally converted to foreign currency at today's FX).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - state_acronym
              - city_name
              - product_code
    columns:
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1986 and extract(year from current_date()) + 1"
      - name: reference_date
        description: "December 31 of reference_year. Use as DATE dimension in Looker Studio."
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: state_name
        description: "Full state name (e.g. 'Bahia') derived from state_acronym."
        tests: [not_null]
      - name: region
        description: "One of: Norte, Nordeste, Centro-Oeste, Sudeste, Sul."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: city_code
        description: "IBGE 7-digit municipal code. Required for Looker Studio municipality geo charts."
        tests: [not_null]
      - name: city_name
        tests: [not_null]
      - name: product_code
        tests: [not_null]
      - name: last_refresh
        description: "Max ingestion_timestamp across the rows aggregated into this record."
        tests: [not_null]
      - name: data_quality_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["OK", "MISSING_VALUE", "MISSING_QUANTITY", "INCOMPLETE"]

  - name: gold_commodity_year_product
    description: |
      National roll-up of gold_commodity_matrix, aggregated to
      (reference_year, product_code). ~10× smaller than gold_commodity_state_year
      — ideal for "Brasil total by product over time" Looker pages (line charts,
      scorecards). Drill-down by state uses gold_commodity_state_year; by
      municipality uses gold_commodity_matrix.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - product_code
    columns:
      - name: reference_year
        tests: [not_null]
      - name: product_code
        tests: [not_null]
      - name: last_refresh
        tests: [not_null]

  - name: gold_commodity_state_year
    description: |
      State-level pre-aggregate of gold_commodity_matrix. ~10× smaller than
      the municipal table — ideal for executive Looker pages that filter by
      state / region / year / product. Page-level drill-down should use
      gold_commodity_matrix for municipal detail.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - state_acronym
              - product_code
    columns:
      - name: reference_year
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: product_code
        tests: [not_null]

  - name: gold_commodity_state_total_year
    description: |
      Geographic-only roll-up of gold_commodity_matrix: one row per
      (reference_year, state_acronym), aggregated across ALL products and
      municipalities. ~1k rows total (~40 years × 27 UFs). Sized for the
      dashboard's Geography view: choropleths, regional rankings,
      concentration KPIs, state totals — all without runtime product
      aggregation.

      Sibling of gold_commodity_year_product (year × product) and
      gold_commodity_state_year (year × state × product). All three derive
      in parallel from gold_commodity_matrix.

      Coverage counters use DISTINCT cardinality (count distinct city_name /
      product_code) — summing n_municipalities_* from state_year would
      double-count cities that produce multiple commodities.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - state_acronym
    columns:
      - name: reference_year
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: state_name
        tests: [not_null]
      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: n_municipalities_total
        description: "Distinct municipalities producing any commodity in this (year, state)."
        tests: [not_null]
      - name: n_municipalities_ok
        description: "Distinct municipalities with data_quality_flag = 'OK'. Always ≤ n_municipalities_total."
        tests: [not_null]
      - name: n_products
        description: "Distinct product_codes with data in this (year, state)."
        tests: [not_null]
      - name: last_refresh
        tests: [not_null]
