version: 2

models:
  - name: gold_pevs_production
    description: |
      Gold table for IBGE PEVS — the single, comprehensive `production` table
      for this source (naming convention: gold_<fonte>_<forma>; `production` =
      one row per produced/extracted measurement, no origin→destination).
      Wide, partitioned, clustered fact table. One row per
      (reference_year, state_acronym, city_name, product_code).
      Any state/year/national aggregation is derived at query time via GROUP BY
      — we deliberately keep ONE table per source instead of pre-aggregated
      siblings (simplicity over query efficiency for now).
      Physical table (not a view) so BI Engine can cache it.

      Value columns: val_yearfx_{brl,usd,eur,cny} (nominal at year-of-record FX),
      val_real_ipca_{brl,usd,eur,cny} / val_real_igpm_{brl,usd,eur,cny} /
      val_real_igpdi_{brl,usd,eur,cny} (deflated to today via the respective
      BCB chain index, optionally converted to foreign currency at today's FX).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference_year
              - state_acronym
              - city_name
              - product_code
    columns:
      - name: reference_year
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 1986 and extract(year from current_date()) + 1"
      - name: reference_date
        description: "December 31 of reference_year. Use as DATE dimension in Looker Studio."
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: state_name
        description: "Full state name (e.g. 'Bahia') derived from state_acronym."
        tests: [not_null]
      - name: region
        description: "One of: Norte, Nordeste, Centro-Oeste, Sudeste, Sul."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"]
      - name: city_code
        description: "IBGE 7-digit municipal code. Required for Looker Studio municipality geo charts."
        tests: [not_null]
      - name: city_name
        tests: [not_null]
      - name: product_code
        tests: [not_null]
      - name: last_refresh
        description: "Max ingestion_timestamp across the rows aggregated into this record."
        tests: [not_null]
      - name: data_quality_flag
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["OK", "MISSING_VALUE", "MISSING_QUANTITY", "INCOMPLETE"]

