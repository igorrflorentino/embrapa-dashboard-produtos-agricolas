name: embrapa_commodities
version: "0.1.0"
config-version: 2

profile: embrapa_commodities

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

clean-targets:
  - target
  - dbt_packages

# Apply a 7-day default_table_expiration to dev_silver / dev_gold AFTER dbt
# has created them. Prod is a no-op (production tables never expire).
on-run-end:
  - "{{ apply_dev_ttl(days=7) }}"

models:
  embrapa_commodities:
    +persist_docs:
      relation: true
      columns: true
    silver:
      +materialized: table
      +schema: "{{ env_var('BQ_SILVER_DATASET', 'silver') }}"
    gold:
      +materialized: table
      +schema: "{{ env_var('BQ_GOLD_DATASET', 'gold') }}"

seeds:
  embrapa_commodities:
    # Seeds land in the same dataset as Silver (they are reference data consumed
    # by Silver models). In dev: dbt_dev_silver. In prod: silver.
    +schema: "{{ env_var('BQ_SILVER_DATASET', 'silver') }}"

vars:
  ibge_variable_quantity: "144"
  ibge_variable_value: "145"

  # Codes consumed by the Gold deflation logic. If you change the keys in
  # BCB_INFLATION_SERIES (.env), set the matching env vars below so dbt picks
  # the right series for IPCA/IGP-M/IGP-DI projections.
  inflation_series_ipca:  "{{ env_var('BCB_INFLATION_SERIES_IPCA_CODE',  '433') }}"
  inflation_series_igpm:  "{{ env_var('BCB_INFLATION_SERIES_IGPM_CODE',  '189') }}"
  inflation_series_igpdi: "{{ env_var('BCB_INFLATION_SERIES_IGPDI_CODE', '190') }}"
