name: embrapa_dashboard
version: "0.1.0"
config-version: 2

profile: embrapa_dashboard

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

clean-targets:
  - target
  - dbt_packages

# Apply a 7-day default_table_expiration to dev_silver / dev_gold AFTER dbt
# has created them. Prod is a no-op (production tables never expire).
on-run-end:
  - "{{ apply_dev_ttl(days=7) }}"

models:
  embrapa_dashboard:
    +persist_docs:
      relation: true
      columns: true
    silver:
      +materialized: table
      +schema: "{{ env_var('BQ_SILVER_DATASET', 'silver') }}"
    gold:
      +materialized: table
      +schema: "{{ env_var('BQ_GOLD_DATASET', 'gold') }}"
    # Conformed dimensions (dim_date, dim_geo_br, dim_geo_municipio). Build-time
    # inputs to the serving marts, so they live alongside the curated Gold layer. The SCD2
    # curation dim overrides its own schema → the serving dataset (it is read
    # live by the dashboard) and is gated behind var('enable_curation').
    core:
      +materialized: table
      +schema: "{{ env_var('BQ_GOLD_DATASET', 'gold') }}"
    # Serving layer — pre-aggregated marts for the dashboard's Pushdown Computing
    # (React SPA + Flask webapi BFF).
    # Materialized as TABLES (not views): a view over Gold would re-scan the full
    # fact every query and save nothing; pre-aggregated tables are the GB→MB cut.
    # Its own dataset so the dashboard's read-only SA can be scoped to JUST the
    # serving surface (least privilege).
    serving:
      +materialized: table
      +schema: "{{ env_var('BQ_SERVING_DATASET', 'serving') }}"

seeds:
  embrapa_dashboard:
    # Seeds land in the same dataset as Silver (they are reference data consumed
    # by Silver models). In dev: dbt_dev_silver. In prod: silver.
    +schema: "{{ env_var('BQ_SILVER_DATASET', 'silver') }}"

vars:
  ibge_variable_quantity: "144"
  ibge_variable_value: "145"

  # IBGE PAM (SIDRA table 5457) variable codes. `v/all` ingests all of them; the
  # Silver model keeps these five real measures (dropping the 3 "% do total"
  # variables) and Gold pivots them into columns. Verified against the SIDRA 5457
  # metadata (área plantada/colhida in ha, quantidade in t, rendimento in kg/ha,
  # valor in Mil Reais for 1994+).
  pam_variable_area_planted: "8331"     # Área plantada ou destinada à colheita (Hectares)
  pam_variable_area_harvested: "216"    # Área colhida (Hectares)
  pam_variable_quantity: "214"          # Quantidade produzida (Toneladas)
  pam_variable_yield: "112"             # Rendimento médio da produção (kg/Hectare)
  pam_variable_value: "215"             # Valor da produção (Mil Reais, 1994+)

  # IBGE PPM (Pesquisa da Pecuária Municipal) — multi-table. silver_ibge_ppm unions
  # the herd table (3939, quantity var 105 = Efetivo dos rebanhos, Cabeças) and the
  # animal-production table (74, quantity var 106 + value var 215). Keep in sync with
  # PPM_HERD_VARIABLE_CODES / PPM_ANIMAL_VARIABLE_CODES (.env).
  ppm_variable_herd: "105"              # Efetivo dos rebanhos (Cabeças) — herd STOCK
  ppm_variable_animal_qty: "106"        # Produção de origem animal (qty; unit varies)
  ppm_variable_value: "215"             # Valor da produção (Mil Reais, 1994+)

  # Codes consumed by the Gold deflation logic. If you change the keys in
  # BCB_INFLATION_SERIES (.env), set the matching env vars below so dbt picks
  # the right series for IPCA/IGP-M/IGP-DI projections.
  inflation_series_ipca:  "{{ env_var('BCB_INFLATION_SERIES_IPCA_CODE',  '433') }}"
  inflation_series_igpm:  "{{ env_var('BCB_INFLATION_SERIES_IGPM_CODE',  '189') }}"
  inflation_series_igpdi: "{{ env_var('BCB_INFLATION_SERIES_IGPDI_CODE', '190') }}"

  # CODE:LABEL pairs of the BCB FX series to surface in Silver (mirror
  # BCB_CURRENCY_SERIES in .env / config.py). silver_bcb_currency filters
  # series_code to these so a series removed from the config but still lingering
  # in append-only Bronze never leaks into Silver.
  currency_series: "{{ env_var('BCB_CURRENCY_SERIES', '1:USD,21619:EUR') }}"

  # Q1 quality outlier/problemático detection (implied-price consistency). ON: validated on
  # live prod across ALL 5 sources — with the magnitude floor below, the problemático rate is
  # PEVS 0.003% / COMEX 0.19% / PAM 0.03% / PPM 0.002% / COMTRADE 0.43% (all genuine typos,
  # overwhelmingly weight=1 placeholders + dropped digits; spot-checked). The floor is what
  # makes a single global threshold work — without it, tiny-municipality rounding over-flagged
  # PAM/PPM at ~2%. Set false to revert to the legacy 4-value flag (compiled byte-identical).
  enable_quality_outliers: true
  quality_price_k: 100        # implied price >price_k× or <1/price_k× the product median = typo
  quality_outlier_k: 4.0      # magnitude log-fence for the OUTLIER (valid-but-large) tier
  quality_min_obs: 100        # per-product sample floor — fewer rows ⇒ never flag (untrustworthy)
  quality_value_floor: 100000 # skip rows below this (deflated BRL / USD) — low-stakes rounding noise

  # COMTRADE totals-only floor. silver_comtrade_flows drops any Bronze row with
  # reference_year below this, so a re-anchored ingest window (config.comtrade_start_year
  # = 2000) doesn't keep stale pre-2000 rows the delta ingest no longer refreshes. Keep in
  # sync with COMTRADE_START_YEAR (.env / config.py).
  comtrade_min_year: 2000

  # Engenharia de Atributos (researcher-editable derived attributes). Gates the SCD2
  # view(s) over the research_inputs curation logs — today dim_code_industrialization_scd2
  # (per-code industrialization). The feature is UNFROZEN, so this stays TRUE (prod also
  # passes it via the DBT_ENABLE_CURATION repo var). Prerequisite: the log table the SCD2
  # reads must exist (auto-created on the first editor write / an ensure step) — a build
  # with the source table absent fails on the SCD2 model.
  enable_curation: true
