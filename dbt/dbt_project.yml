name: embrapa_commodities
version: "0.1.0"
config-version: 2

profile: embrapa_commodities

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

clean-targets:
  - target
  - dbt_packages

# Apply a 7-day default_table_expiration to dev_silver / dev_gold AFTER dbt
# has created them. Prod is a no-op (production tables never expire).
on-run-end:
  - "{{ apply_dev_ttl(days=7) }}"

models:
  embrapa_commodities:
    +persist_docs:
      relation: true
      columns: true
    silver:
      +materialized: table
      +schema: "{{ env_var('BQ_SILVER_DATASET', 'silver') }}"
    gold:
      +materialized: table
      +schema: "{{ env_var('BQ_GOLD_DATASET', 'gold') }}"
    # Conformed dimensions (dim_date, dim_geo_br). Build-time inputs to the
    # serving marts, so they live alongside the curated Gold layer. The SCD2
    # curation dim overrides its own schema → the serving dataset (it is read
    # live by the dashboard) and is gated behind var('enable_curation').
    core:
      +materialized: table
      +schema: "{{ env_var('BQ_GOLD_DATASET', 'gold') }}"
    # Serving layer — pre-aggregated marts for the Dash app's Pushdown Computing.
    # Materialized as TABLES (not views): a view over Gold would re-scan the full
    # fact every query and save nothing; pre-aggregated tables are the GB→MB cut.
    # Its own dataset so the dashboard's read-only SA can be scoped to JUST the
    # serving surface (least privilege).
    serving:
      +materialized: table
      +schema: "{{ env_var('BQ_SERVING_DATASET', 'serving') }}"

seeds:
  embrapa_commodities:
    # Seeds land in the same dataset as Silver (they are reference data consumed
    # by Silver models). In dev: dbt_dev_silver. In prod: silver.
    +schema: "{{ env_var('BQ_SILVER_DATASET', 'silver') }}"

vars:
  ibge_variable_quantity: "144"
  ibge_variable_value: "145"

  # IBGE PAM (SIDRA table 5457) variable codes. `v/all` ingests all of them; the
  # Silver model keeps these five real measures (dropping the 3 "% do total"
  # variables) and Gold pivots them into columns. Verified against the SIDRA 5457
  # metadata (área plantada/colhida in ha, quantidade in t, rendimento in kg/ha,
  # valor in Mil Reais for 1994+).
  pam_variable_area_planted: "8331"     # Área plantada ou destinada à colheita (Hectares)
  pam_variable_area_harvested: "216"    # Área colhida (Hectares)
  pam_variable_quantity: "214"          # Quantidade produzida (Toneladas)
  pam_variable_yield: "112"             # Rendimento médio da produção (kg/Hectare)
  pam_variable_value: "215"             # Valor da produção (Mil Reais, 1994+)

  # Codes consumed by the Gold deflation logic. If you change the keys in
  # BCB_INFLATION_SERIES (.env), set the matching env vars below so dbt picks
  # the right series for IPCA/IGP-M/IGP-DI projections.
  inflation_series_ipca:  "{{ env_var('BCB_INFLATION_SERIES_IPCA_CODE',  '433') }}"
  inflation_series_igpm:  "{{ env_var('BCB_INFLATION_SERIES_IGPM_CODE',  '189') }}"
  inflation_series_igpdi: "{{ env_var('BCB_INFLATION_SERIES_IGPDI_CODE', '190') }}"

  # CODE:LABEL pairs of the BCB FX series to surface in Silver (mirror
  # BCB_CURRENCY_SERIES in .env / config.py). silver_bcb_currency filters
  # series_code to these so a series removed from the config but still lingering
  # in append-only Bronze never leaks into Silver.
  currency_series: "{{ env_var('BCB_CURRENCY_SERIES', '1:USD,21619:EUR') }}"
