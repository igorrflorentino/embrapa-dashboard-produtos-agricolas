version: 2

seeds:
  - name: historical_currency_factors
    description: |
      Multiplier to convert each historical Brazilian "Mil X" monetary unit
      reported by IBGE PEVS to present-day BRL. The factor embeds:
        (a) the "Mil" multiplier (since IBGE reports values in thousands), and
        (b) the cumulative currency reform divisions (Cz$/NCz$/Cr$/CR$ → R$).

      Date-aware because the name "Mil Cruzeiros" was used for THREE distinct
      currencies with different factors (1942 Cr$, 1970 Cr$, 1990 Cr$). The
      Silver model joins on (unit_of_measure, reference_year BETWEEN
      year_from AND year_to) — ranges are non-overlapping by design.

      Reform timeline (factors derived assuming IBGE labels each annual row
      with the currency at end-of-year):
        Cr$    1942-11-01 → NCr$   1967-02-13 (÷1000)
        NCr$   1967-02-13 → Cr$    1970-05-15 (÷1, rename)
        Cr$    1970-05-15 → Cz$    1986-02-28 (÷1000)
        Cz$    1986-02-28 → NCz$   1989-01-16 (÷1000)
        NCz$   1989-01-16 → Cr$    1990-03-16 (÷1, rename)
        Cr$    1990-03-16 → CR$    1993-08-01 (÷1000)
        CR$    1993-08-01 → R$     1994-07-01 (÷2750)

      Coverage: 1942 onwards (PEVS table 289 doesn't have older data).
      Real colonial (~1500-1833) and Mil-Réis (1833-1942) are intentionally
      omitted — the IBGE unit string for those eras is unknown and PEVS
      doesn't reach back that far.

      ⚠️ 1985 PAM/PPM caveat (investigated 2026-06-27 on live prod, NOT yet fixed).
      The DEFLATED value (val_real_ipca_brl) of 1985 PAM + PPM rows is ~1000× too small
      (median price collapses to ~1/1000 of BOTH the 1984 and 1986 neighbours) while the
      QUANTITY is normal — so the defect is upstream of the IPCA/IGP chain. The "end-of-year
      currency" rule above puts 1985 in Mil Cruzeiros (Cr$, 3.6e-10), but the data behaves as
      if 1985 were already in Mil Cruzados (Cz$, 3.6e-7): multiplying 1985 by 1000 lands it
      exactly on the 1984/1986 trend. Likely cause: IBGE restated the 1985 PAM/PPM municipal
      surveys in the post-reform unit (the Cz$ reform was 1986-02-28, but PAM/PPM publish with
      a lag). CANDIDATE FIX — do NOT apply blind: a 1985-only Cz$ factor for PAM/PPM, but first
      confirm IBGE's actual 1985 unit (PEVS has no 1984/1985 massa-with-value rows to corroborate,
      and over-correcting would make 1985 1000× too LARGE). It needs a --full-refresh rebuild and
      touches every 1985 IBGE value. Until confirmed, Q1 correctly flags these 1985 rows as
      problemático.
    config:
      column_types:
        unit_of_measure: string
        year_from: int64
        year_to: int64
        brl_factor: float64
    columns:
      - name: unit_of_measure
        tests: [not_null]
      - name: year_from
        tests: [not_null]
      - name: year_to
        tests: [not_null]
      - name: brl_factor
        tests: [not_null]

  # ─── Physical-unit family conversion ───────────────────────────────────────
  - name: unit_family_conversions
    description: |
      Canonical unit → physical-unit family + conversion to the family's base
      unit. The single source of truth for quantity normalisation — NO factor
      is ever hard-coded in a model. Joined in Silver on
      lower(trim(source_unit)) = unit_raw.

      Families and base units:
        massa → t · volume → m³ · energia → MWh · contagem → un · area → ha
      A unit outside these five maps to 'desconhecida' downstream (no seed row)
      with a NULL qty_base — never an invented conversion.

      `unit_raw` holds the source label(s) lowercased (both canonical tokens
      like 't'/'m³' and the literal strings each source emits, e.g.
      'toneladas', 'metro cubico', 'quilograma liquido'). Add a row when a new
      source emits a new label.

      Commodity units whose factor depends on the product (saca, @, arroba,
      bushel, barril) appear here with their family/base_unit but a BLANK
      to_base: the conversion is deferred to product_unit_factors. Until that
      crosswalk supplies to_base, qty_base stays NULL (surfaced for curation).
    config:
      column_types:
        unit_raw: string
        family: string
        base_unit: string
        to_base: float64
    columns:
      - name: unit_raw
        tests: [not_null, unique]
      - name: family
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area"]
      - name: base_unit
        tests: [not_null]

  - name: product_unit_factors
    description: |
      Per-product override for commodity units whose conversion factor depends
      on the product (saca, @, arroba, bushel, barril — e.g. 1 saca of coffee =
      60 kg but a bushel of soybeans ≠ a bushel of corn). Overrides
      unit_family_conversions when (source, product_code, unit_raw) matches;
      otherwise the generic seed applies.

      Joined in Silver on source + product_code + lower(trim(source_unit)).
      `source` is the pipeline source ('pevs', 'comex', …); rows under the
      sentinel source '_reference' are documented canonical factors that match
      NO real join — replace source/product_code with the real identifiers when
      a source that reports these units is added.

      INERT BY DESIGN today (not a wiring bug): every shipped row uses
      source='_reference', and Silver joins on source IN ('pevs','comex'), so
      none are selected — none of PEVS/COMEX/COMTRADE currently report these
      commodity units. The override path itself IS correct and is exercised by
      the _silver.yml unit test (a synthetic pevs/9999/saca row). To activate a
      factor, copy its row and set source/product_code to the real identifiers.

      NOT the same thing as the cross-source COMMODITY crosswalk
      (commodity_crosswalk seed → gold_commodity_crosswalk model, the "Phase 3"
      product bridge, which IS fully wired). This seed is the per-product UNIT
      crosswalk — a different concern.
    config:
      column_types:
        source: string
        product_code: string
        unit_raw: string
        family: string
        base_unit: string
        to_base: float64
    columns:
      - name: to_base
        tests: [not_null]
      - name: family
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area"]

  # ─── COMEX reference dimensions (MDIC Comex Stat aux tables) ────────────────
  - name: comex_unit
    description: |
      MDIC statistical-unit dimension (NCM_UNIDADE.csv): CO_UNID → human label.
      The COMEX statistical_quantity is in the NCM's statistical unit, which
      varies by product (e.g. 10=quilograma, 16=metro cúbico, 17=litro). Joined
      into gold_comex_flows on stat_unit_code = co_unid.
    config:
      column_types:
        co_unid: string
        unit_name: string
        unit_symbol: string
    columns:
      - name: co_unid
        tests: [not_null, unique]
      - name: unit_name
        tests: [not_null]

  - name: comex_via
    description: |
      MDIC transport-mode dimension (VIA.csv): CO_VIA → Portuguese label
      (01=Marítima, 04=Aérea, 07=Rodoviária, …). Joined into gold_comex_flows on
      transport_route_code = co_via to back the frontend's `via` filter.
    config:
      column_types:
        co_via: string
        via_name: string
    columns:
      - name: co_via
        tests: [not_null, unique]
      - name: via_name
        tests: [not_null]

  - name: comex_country
    description: |
      MDIC country dimension (PAIS.csv): CO_PAIS → ISO-alpha3 + Portuguese name.
      Joined into gold_comex_flows on country_code = co_pais.
    config:
      column_types:
        co_pais: string
        iso_a3: string
        country_name: string
    columns:
      - name: co_pais
        tests: [not_null, unique]
      - name: country_name
        tests: [not_null]

  - name: comex_ncm
    description: |
      MDIC NCM dimension (NCM.csv), filtered to the COMEX scope (castanha 0801*
      + chapter 44): CO_NCM → Portuguese description. Joined into
      gold_comex_flows on ncm_code = co_ncm. Extend the filter if the COMEX
      product scope grows beyond these chapters.
    config:
      column_types:
        co_ncm: string
        ncm_description: string
    columns:
      - name: co_ncm
        tests: [not_null, unique]
      - name: ncm_description
        tests: [not_null]

  - name: comex_ncm_succession
    description: |
      NCM succession (retired → current) for transparent full-history COMEX queries.
      The MDIC bulk reports each year under the NCM then in force (it does NOT
      restate), so a commodity whose 8-digit NCM was renumbered by a revision shows
      under the retired code for older years — soja 1201.00.10/.90 (pre-2017) and
      banana 0803.00.00 (pre-2012). silver_comex_flows rewrites ncm_code from
      `reported_code` to `current_code` (keeping the raw value in ncm_code_reported),
      so Gold / serving / the dashboard only ever expose current NCMs. (castanha,
      milho and arroz already report their current NCMs across the whole 1997+
      series, so they need no mapping.) Extend this seed — no code change.
    config:
      column_types:
        reported_code: string
        current_code: string
        note: string
    columns:
      - name: reported_code
        tests: [not_null, unique]
      - name: current_code
        tests: [not_null]

  # ─── UN Comtrade reference dimensions ──────────────────────────────────────
  - name: comtrade_country
    description: |
      UN Comtrade M49 area dimension (from partnerAreas.json): m49_code → ISO-alpha3
      + Portuguese name + is_group flag. Resolves BOTH reporter_code and
      partner_code in gold_comtrade_flows, which flow to the SPA verbatim — so the
      names are pt-BR to match the sibling COMEX dimensions (project language rule:
      any string the end user could read is Portuguese). "nes" → "nep" (não
      especificado). is_group marks aggregate areas (UE, "X, nep", …); World
      (code 0) is dropped upstream in Silver. The refresh script
      (`uv run python scripts/refresh_comtrade_country_seed.py`) only rebuilds the
      M49 → ISO scaffold from the English UN source: the country_name column is
      curated pt-BR maintained HERE, so re-running the script must NOT overwrite
      it back to English (re-translate any newly added codes by hand).
    config:
      column_types:
        m49_code: string
        iso_a3: string
        country_name: string
        is_group: boolean
    columns:
      - name: m49_code
        tests: [not_null, unique]
      - name: country_name
        tests: [not_null]

  - name: comtrade_unit
    description: |
      UN Comtrade quantity-unit dimension: qty_unit_code → label + symbol + unit_raw.
      unit_raw is the canonical key into unit_family_conversions (family/base_unit/
      to_base); blank = no physical-unit family (→ 'desconhecida'). UN Comtrade
      publishes no qty-unit reference file, so these are the codes that ACTUALLY
      appear in the 0801+44 scope, each validated against the HS standardUnitAbbr
      of its commodities: 5=number of items (u), 8=kg, 12=m³; -1/1=no quantity.
      A qty_unit_code absent here degrades gracefully to family 'desconhecida' —
      extend this seed (re-validating against the data) when the scope grows.
    config:
      column_types:
        qty_unit_code: string
        unit_name: string
        unit_symbol: string
        unit_raw: string
    columns:
      - name: qty_unit_code
        tests: [not_null, unique]
      - name: unit_name
        tests: [not_null]

  - name: comtrade_hs
    description: |
      UN Comtrade HS commodity dimension (from HS.json), filtered to the Comtrade
      scope (0801* nuts + chapter 44 wood/charcoal): cmd_code → description +
      hs_level + standard_unit. Joined into gold_comtrade_flows on cmd_code.
      The `description` column is curated in Portuguese (it flows to the SPA via
      cmd_description, so it follows the project language rule and matches the
      pt-BR COMEX NCM descriptions). Extend the filter — re-translating new
      descriptions — if the product scope grows beyond these.
    config:
      column_types:
        cmd_code: string
        hs_level: int64
        standard_unit: string
        description: string
    columns:
      - name: cmd_code
        tests: [not_null, unique]
      - name: description
        tests: [not_null]

  - name: comtrade_hs_succession
    description: |
      HS code succession (retired → current) for transparent full-history queries.
      UN Comtrade reports each year under the HS revision then in force, so a
      commodity whose 6-digit code was split across revisions appears under a
      retired aggregate for older years (banana 080300 pre-HS2012; soja 120100
      pre-HS2012; castanha 080120 pre-HS2007; some ch.44 wood pre-HS2017).
      silver_comtrade_flows rewrites cmd_code from `reported_code` to
      `current_code` (keeping the raw value in cmd_code_reported), so Gold /
      serving / the dashboard only ever expose CURRENT codes — the user never sees
      a retired code. Because COMTRADE ingests Brazil as the sole reporter, the
      broad→specific canonical targets are chosen for Brazil's dominant trade form
      (documented per row), which is accurate for Brazilian data. Extend this seed
      to map further retired leaves (e.g. ch.44 species splits) — no code change.
    config:
      column_types:
        reported_code: string
        current_code: string
        note: string
    columns:
      - name: reported_code
        tests: [not_null, unique]
      - name: current_code
        tests: [not_null]

  # ─── Cross-source product bridge — RETIRED ─────────────────────────────────
  # The commodity_crosswalk seed was replaced by the editable Curadoria catalog
  # (research_inputs.commodity_catalog_log → core/dim_commodity_catalog). The three
  # consumers (gold_commodity_crosswalk + serving_{pam,ppm}_annual) read the dim now;
  # the cutover was proven row-identical on real data. See PLANS/curadoria_catalogo.md.

  # ─── IBGE municipal territorial mesh (sub-UF geography) ─────────────────────
  - name: ibge_municipio_mesh
    description: |
      IBGE territorial mesh: each município (7-digit city_code — the SIDRA n6 code
      Gold already carries) → its sub-UF groupings, in BOTH parallel IBGE
      divisions. The two divisions do NOT nest into each other:
        • classic census : mesorregião (4-digit) → microrregião (5-digit) → município
        • current (2017)  : região intermediária (4-digit) → região imediata (6-digit) → município
      Both branches share the same UF + grande região (macrorregião). Backs the
      sub-UF geography filters and the live município level (dim_geo_municipio →
      the serving município cube). Regenerate with
      `uv run python scripts/refresh_ibge_municipio_mesh.py`. ~5570 rows, one per município.
    config:
      column_types:
        city_code: string
        city_name: string
        uf_code: string
        state_acronym: string
        state_name: string
        region_code: string
        region_abbrev: string
        region_name: string
        meso_code: string
        meso_name: string
        micro_code: string
        micro_name: string
        intermediaria_code: string
        intermediaria_name: string
        imediata_code: string
        imediata_name: string
    columns:
      - name: city_code
        tests: [not_null, unique]
      - name: city_name
        tests: [not_null]
      - name: state_acronym
        tests: [not_null]
      - name: region_abbrev
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["N", "NE", "CO", "SE", "S"]
      # Sub-UF codes are WARN (not error): an occasional IBGE API gap for a newly
      # created município must not hard-fail the build — it degrades to "not
      # filterable at that level", and the warn surfaces it for a seed refresh.
      - name: meso_code
        tests:
          - not_null:
              config: { severity: warn }
      - name: micro_code
        tests:
          - not_null:
              config: { severity: warn }
      - name: intermediaria_code
        tests:
          - not_null:
              config: { severity: warn }
      - name: imediata_code
        tests:
          - not_null:
              config: { severity: warn }
