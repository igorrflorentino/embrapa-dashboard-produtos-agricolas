version: 2

seeds:
  - name: ibge_product_codes
    description: |
      Mapping from IBGE classification 193 category code (the code declared in
      IBGE_PRODUCT_CODES on .env) to the product description as it appears in
      the SIDRA values payload. The Silver model joins on `product_description`
      to expose the classification_code as the canonical `product_code` in
      downstream Gold.

      Maintenance: when you add or remove a product from IBGE_PRODUCT_CODES,
      update this file accordingly (one row per product). `dbt build` re-seeds
      automatically and a not_null test on the Gold `product_code` will fail
      if a description appears in Silver without a corresponding seed entry.
    config:
      column_types:
        classification_code: string
        product_description: string
    columns:
      - name: classification_code
        tests: [not_null, unique]
      - name: product_description
        tests: [not_null, unique]

  - name: historical_currency_factors
    description: |
      Multiplier to convert each historical Brazilian "Mil X" monetary unit
      reported by IBGE PEVS to present-day BRL. The factor embeds:
        (a) the "Mil" multiplier (since IBGE reports values in thousands), and
        (b) the cumulative currency reform divisions (Cz$/NCz$/Cr$/CR$ → R$).

      Date-aware because the name "Mil Cruzeiros" was used for THREE distinct
      currencies with different factors (1942 Cr$, 1970 Cr$, 1990 Cr$). The
      Silver model joins on (unit_of_measure, reference_year BETWEEN
      year_from AND year_to) — ranges are non-overlapping by design.

      Reform timeline (factors derived assuming IBGE labels each annual row
      with the currency at end-of-year):
        Cr$    1942-11-01 → NCr$   1967-02-13 (÷1000)
        NCr$   1967-02-13 → Cr$    1970-05-15 (÷1, rename)
        Cr$    1970-05-15 → Cz$    1986-02-28 (÷1000)
        Cz$    1986-02-28 → NCz$   1989-01-16 (÷1000)
        NCz$   1989-01-16 → Cr$    1990-03-16 (÷1, rename)
        Cr$    1990-03-16 → CR$    1993-08-01 (÷1000)
        CR$    1993-08-01 → R$     1994-07-01 (÷2750)

      Coverage: 1942 onwards (PEVS table 289 doesn't have older data).
      Real colonial (~1500-1833) and Mil-Réis (1833-1942) are intentionally
      omitted — the IBGE unit string for those eras is unknown and PEVS
      doesn't reach back that far.
    config:
      column_types:
        unit_of_measure: string
        year_from: int64
        year_to: int64
        brl_factor: float64
    columns:
      - name: unit_of_measure
        tests: [not_null]
      - name: year_from
        tests: [not_null]
      - name: year_to
        tests: [not_null]
      - name: brl_factor
        tests: [not_null]
