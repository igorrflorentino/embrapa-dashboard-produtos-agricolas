version: 2

seeds:
  - name: historical_currency_factors
    description: |
      Multiplier to convert each historical Brazilian "Mil X" monetary unit
      reported by IBGE PEVS to present-day BRL. The factor embeds:
        (a) the "Mil" multiplier (since IBGE reports values in thousands), and
        (b) the cumulative currency reform divisions (Cz$/NCz$/Cr$/CR$ → R$).

      Date-aware because the name "Mil Cruzeiros" was used for THREE distinct
      currencies with different factors (1942 Cr$, 1970 Cr$, 1990 Cr$). The
      Silver model joins on (unit_of_measure, reference_year BETWEEN
      year_from AND year_to) — ranges are non-overlapping by design.

      Reform timeline (factors derived assuming IBGE labels each annual row
      with the currency at end-of-year):
        Cr$    1942-11-01 → NCr$   1967-02-13 (÷1000)
        NCr$   1967-02-13 → Cr$    1970-05-15 (÷1, rename)
        Cr$    1970-05-15 → Cz$    1986-02-28 (÷1000)
        Cz$    1986-02-28 → NCz$   1989-01-16 (÷1000)
        NCz$   1989-01-16 → Cr$    1990-03-16 (÷1, rename)
        Cr$    1990-03-16 → CR$    1993-08-01 (÷1000)
        CR$    1993-08-01 → R$     1994-07-01 (÷2750)

      Coverage: 1942 onwards (PEVS table 289 doesn't have older data).
      Real colonial (~1500-1833) and Mil-Réis (1833-1942) are intentionally
      omitted — the IBGE unit string for those eras is unknown and PEVS
      doesn't reach back that far.
    config:
      column_types:
        unit_of_measure: string
        year_from: int64
        year_to: int64
        brl_factor: float64
    columns:
      - name: unit_of_measure
        tests: [not_null]
      - name: year_from
        tests: [not_null]
      - name: year_to
        tests: [not_null]
      - name: brl_factor
        tests: [not_null]

  # ─── Physical-unit family conversion ───────────────────────────────────────
  - name: unit_family_conversions
    description: |
      Canonical unit → physical-unit family + conversion to the family's base
      unit. The single source of truth for quantity normalisation — NO factor
      is ever hard-coded in a model. Joined in Silver on
      lower(trim(source_unit)) = unit_raw.

      Families and base units:
        massa → t · volume → m³ · energia → MWh · contagem → un · area → ha
      A unit outside these five maps to 'desconhecida' downstream (no seed row)
      with a NULL qty_base — never an invented conversion.

      `unit_raw` holds the source label(s) lowercased (both canonical tokens
      like 't'/'m³' and the literal strings each source emits, e.g.
      'toneladas', 'metro cubico', 'quilograma liquido'). Add a row when a new
      source emits a new label.

      Commodity units whose factor depends on the product (saca, @, arroba,
      bushel, barril) appear here with their family/base_unit but a BLANK
      to_base: the conversion is deferred to product_unit_factors. Until that
      crosswalk supplies to_base, qty_base stays NULL (surfaced for curation).
    config:
      column_types:
        unit_raw: string
        family: string
        base_unit: string
        to_base: float64
    columns:
      - name: unit_raw
        tests: [not_null, unique]
      - name: family
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area"]
      - name: base_unit
        tests: [not_null]

  - name: product_unit_factors
    description: |
      Per-product override for commodity units whose conversion factor depends
      on the product (saca, @, arroba, bushel, barril — e.g. 1 saca de café =
      60 kg but a bushel of soja ≠ a bushel of milho). Overrides
      unit_family_conversions when (source, product_code, unit_raw) matches;
      otherwise the generic seed applies.

      Joined in Silver on source + product_code + lower(trim(source_unit)).
      `source` is the pipeline source ('pevs', 'comex', …); rows under the
      sentinel source '_reference' are documented canonical factors that match
      NO real join — replace source/product_code with the real identifiers when
      a source that reports these units is added.
    config:
      column_types:
        source: string
        product_code: string
        unit_raw: string
        family: string
        base_unit: string
        to_base: float64
    columns:
      - name: to_base
        tests: [not_null]
      - name: family
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["massa", "volume", "energia", "contagem", "area"]

  # ─── COMEX reference dimensions (MDIC Comex Stat aux tables) ────────────────
  - name: comex_unit
    description: |
      MDIC statistical-unit dimension (NCM_UNIDADE.csv): CO_UNID → human label.
      The COMEX statistical_quantity is in the NCM's statistical unit, which
      varies by product (e.g. 10=quilograma, 16=metro cúbico, 17=litro). Joined
      into gold_comex_flows on stat_unit_code = co_unid.
    config:
      column_types:
        co_unid: string
        unit_name: string
        unit_symbol: string
    columns:
      - name: co_unid
        tests: [not_null, unique]
      - name: unit_name
        tests: [not_null]

  - name: comex_country
    description: |
      MDIC country dimension (PAIS.csv): CO_PAIS → ISO-alpha3 + Portuguese name.
      Joined into gold_comex_flows on country_code = co_pais.
    config:
      column_types:
        co_pais: string
        iso_a3: string
        country_name: string
    columns:
      - name: co_pais
        tests: [not_null, unique]
      - name: country_name
        tests: [not_null]

  - name: comex_ncm
    description: |
      MDIC NCM dimension (NCM.csv), filtered to the COMEX scope (castanha 0801*
      + chapter 44): CO_NCM → Portuguese description. Joined into
      gold_comex_flows on ncm_code = co_ncm. Extend the filter if the COMEX
      product scope grows beyond these chapters.
    config:
      column_types:
        co_ncm: string
        ncm_description: string
    columns:
      - name: co_ncm
        tests: [not_null, unique]
      - name: ncm_description
        tests: [not_null]

  - name: extfx_cny_brl
    description: |
      Monthly BRL per 1 CNY (Chinese yuan), from the ECB reference rates via the
      Frankfurter API — the BCB does not publish a BRL/CNY rate. Feeds the CNY
      column of the Gold tables (silver_extfx_currency → silver_currency).
      Regenerate with `uv run python scripts/refresh_cny_seed.py`.
    config:
      column_types:
        reference_date: date
        brl_per_cny: float64
    columns:
      - name: reference_date
        tests: [not_null, unique]
      - name: brl_per_cny
        tests: [not_null]
