version: 2

seeds:
  - name: historical_currency_factors
    description: |
      Multiplier to convert each historical Brazilian "Mil X" monetary unit
      reported by IBGE PEVS to present-day BRL. The factor embeds:
        (a) the "Mil" multiplier (since IBGE reports values in thousands), and
        (b) the cumulative currency reform divisions (Cz$/NCz$/Cr$/CR$ в†’ R$).

      Date-aware because the name "Mil Cruzeiros" was used for THREE distinct
      currencies with different factors (1942 Cr$, 1970 Cr$, 1990 Cr$). The
      Silver model joins on (unit_of_measure, reference_year BETWEEN
      year_from AND year_to) вЂ” ranges are non-overlapping by design.

      Reform timeline (factors derived assuming IBGE labels each annual row
      with the currency at end-of-year):
        Cr$    1942-11-01 в†’ NCr$   1967-02-13 (Г·1000)
        NCr$   1967-02-13 в†’ Cr$    1970-05-15 (Г·1, rename)
        Cr$    1970-05-15 в†’ Cz$    1986-02-28 (Г·1000)
        Cz$    1986-02-28 в†’ NCz$   1989-01-16 (Г·1000)
        NCz$   1989-01-16 в†’ Cr$    1990-03-16 (Г·1, rename)
        Cr$    1990-03-16 в†’ CR$    1993-08-01 (Г·1000)
        CR$    1993-08-01 в†’ R$     1994-07-01 (Г·2750)

      Coverage: 1942 onwards (PEVS table 289 doesn't have older data).
      Real colonial (~1500-1833) and Mil-RГ©is (1833-1942) are intentionally
      omitted вЂ” the IBGE unit string for those eras is unknown and PEVS
      doesn't reach back that far.
    config:
      column_types:
        unit_of_measure: string
        year_from: int64
        year_to: int64
        brl_factor: float64
    columns:
      - name: unit_of_measure
        tests: [not_null]
      - name: year_from
        tests: [not_null]
      - name: year_to
        tests: [not_null]
      - name: brl_factor
        tests: [not_null]

  # в”Ђв”Ђв”Ђ COMEX reference dimensions (MDIC Comex Stat aux tables) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - name: comex_unit
    description: |
      MDIC statistical-unit dimension (NCM_UNIDADE.csv): CO_UNID в†’ human label.
      The COMEX statistical_quantity is in the NCM's statistical unit, which
      varies by product (e.g. 10=quilograma, 16=metro cГєbico, 17=litro). Joined
      into gold_comex_flows on stat_unit_code = co_unid.
    config:
      column_types:
        co_unid: string
        unit_name: string
        unit_symbol: string
    columns:
      - name: co_unid
        tests: [not_null, unique]
      - name: unit_name
        tests: [not_null]

  - name: comex_country
    description: |
      MDIC country dimension (PAIS.csv): CO_PAIS в†’ ISO-alpha3 + Portuguese name.
      Joined into gold_comex_flows on country_code = co_pais.
    config:
      column_types:
        co_pais: string
        iso_a3: string
        country_name: string
    columns:
      - name: co_pais
        tests: [not_null, unique]
      - name: country_name
        tests: [not_null]

  - name: comex_ncm
    description: |
      MDIC NCM dimension (NCM.csv), filtered to the COMEX scope (castanha 0801*
      + chapter 44): CO_NCM в†’ Portuguese description. Joined into
      gold_comex_flows on ncm_code = co_ncm. Extend the filter if the COMEX
      product scope grows beyond these chapters.
    config:
      column_types:
        co_ncm: string
        ncm_description: string
    columns:
      - name: co_ncm
        tests: [not_null, unique]
      - name: ncm_description
        tests: [not_null]

  - name: extfx_cny_brl
    description: |
      Monthly BRL per 1 CNY (Chinese yuan), from the ECB reference rates via the
      Frankfurter API вЂ” the BCB does not publish a BRL/CNY rate. Feeds the CNY
      column of the Gold tables (silver_extfx_currency в†’ silver_currency).
      Regenerate with `uv run python scripts/refresh_cny_seed.py`.
    config:
      column_types:
        reference_date: date
        brl_per_cny: float64
    columns:
      - name: reference_date
        tests: [not_null, unique]
      - name: brl_per_cny
        tests: [not_null]
