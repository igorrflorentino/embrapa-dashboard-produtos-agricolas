[project]
name = "embrapa-commodities"
version = "0.1.0"
description = "Pipeline Medalhão (IBGE-PEVS + BCB) → BigQuery → Looker Studio"
readme = "README.md"
requires-python = "==3.12.*"
license = { text = "MIT" }
authors = [{ name = "Igor Florentino", email = "igorlopesc@gmail.com" }]
dependencies = [
    "google-cloud-bigquery>=3.25",
    "google-cloud-storage>=2.18",
    "google-cloud-secret-manager>=2.20",
    "google-auth>=2.34",
    "pandas>=2.2",
    "pyarrow>=17",
    "requests>=2.32",
    "tenacity>=9",
    "pydantic>=2.8",
    "pydantic-settings>=2.5",
    "typer>=0.12",
    "rich>=13.7",
    "python-dotenv>=1.0",
    "dbt-core>=1.8",
    "dbt-bigquery>=1.8",
]

[project.scripts]
embrapa = "embrapa_commodities.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/embrapa_commodities"]

[dependency-groups]
dev = [
    "pytest>=8",
    "responses>=0.25",
    "ruff>=0.6",
    "sqlfluff>=3.1",
    "sqlfluff-templater-dbt>=3.1",
    "pre-commit>=3.7",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
